<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自作うぷろだ</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e7e9ea; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .upload-box { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px dashed #1d9bf0; text-align: center; margin-bottom: 30px; }
        .upload-box input[type="file"] { display: none; }
        .upload-label { display: inline-block; background-color: #1d9bf0; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        .upload-label:hover { background-color: #1a8cd8; }
        .file-name-display { margin-top: 10px; font-size: 14px; color: #71767b; word-break: break-all; }
        .comment-input { width: 100%; box-sizing: border-box; padding: 10px; margin-top: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; outline: none; }
        .comment-input:focus { border-color: #1d9bf0; }
        .btn-upload { background-color: #00ba7c; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-upload:hover { background-color: #009966; }
        .btn-upload:disabled { background-color: #333; color: #777; cursor: not-allowed; }
        
        .progress-container { width: 100%; background-color: #333; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 10px; background-color: #1d9bf0; transition: width 0.2s; }

        .file-list { display: flex; flex-direction: column; gap: 15px; }
        .file-item { background: #1e1e1e; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #333; }
        .file-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .file-title { font-weight: bold; font-size: 16px; word-break: break-all; }
        .file-meta { font-size: 12px; color: #71767b; }
        .file-comment { font-size: 14px; margin-top: 5px; }
        .file-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { background: #333; color: #e7e9ea; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 13px; transition: 0.2s; text-decoration: none; text-align: center; display: inline-block; }
        .btn-action:hover { background: #444; }
        .btn-action.copy { background: #1d9bf022; color: #1d9bf0; }
        .btn-action.copy:hover { background: #1d9bf044; }

        #toast { position: fixed; bottom: 20px; background: #1d9bf0; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">📦 自作うぷろだ</h2>

        <div class="upload-box">
            <label for="fileInput" class="upload-label">ファイルを選択</label>
            <input type="file" id="fileInput" onchange="handleFileSelect(event)">
            <div id="fileNameDisplay" class="file-name-display">ファイルが選択されていません</div>
            
            <input type="text" id="fileComment" class="comment-input" placeholder="コメントや説明（任意）">
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <button id="uploadBtn" class="btn-upload" onclick="uploadFile()" disabled>アップロード開始</button>
        </div>

        <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">アップロード履歴</h3>
        <div class="file-list" id="fileList">
            <div style="text-align: center; color: #71767b;">読み込み中...</div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        // Firebaseの設定（SNSと同じ設定を利用）
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBCQArL0Q1wDveRywCpet5Nor3PuRYt7fM", 
            authDomain: "sabopennet.firebaseapp.com", 
            projectId: "sabopennet", 
            storageBucket: "sabopennet.firebasestorage.app", 
            messagingSenderId: "284308308452", 
            appId: "1:284308308452:web:e36dd991e55a0e60e4c7f1" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let selectedFile = null;

        window.handleFileSelect = function(event) {
            const file = event.target.files[0];
            const btn = document.getElementById('uploadBtn');
            const display = document.getElementById('fileNameDisplay');
            
            if (file) {
                selectedFile = file;
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                display.innerText = `${file.name} (${sizeMB} MB)`;
                btn.disabled = false;
            } else {
                selectedFile = null;
                display.innerText = "ファイルが選択されていません";
                btn.disabled = true;
            }
        }

        window.uploadFile = function() {
            if (!selectedFile) return;

            const btn = document.getElementById('uploadBtn');
            const comment = document.getElementById('fileComment').value.trim();
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');

            btn.disabled = true;
            btn.innerText = "アップロード中...";
            progressContainer.style.display = 'block';

            // ファイル名が重複しないようにタイムスタンプと乱数を付与
            const safeName = selectedFile.name.replace(/[^a-zA-Z0-9.\-_]/g, '_'); // 日本語ファイル名文字化け対策
            const uniqueFileName = `upuroda/${Date.now()}_${Math.random().toString(36).substring(2, 8)}_${safeName}`;
            const sRef = storageRef(storage, uniqueFileName);

            const uploadTask = uploadBytesResumable(sRef, selectedFile);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressBar.style.width = progress + '%';
                }, 
                (error) => {
                    alert("エラーが発生しました: " + error.message);
                    resetUploadUI();
                }, 
                async () => {
                    try {
                        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                        
                        // データベース(Firestore)にファイル情報を保存
                        await addDoc(collection(db, "upuroda_files"), {
                            fileName: selectedFile.name,
                            fileSize: selectedFile.size,
                            fileType: selectedFile.type,
                            comment: comment,
                            url: downloadURL,
                            uploadedAt: new Date()
                        });

                        showToast("アップロード完了！");
                        resetUploadUI();
                    } catch (err) {
                        alert("データベース保存エラー: " + err.message);
                        resetUploadUI();
                    }
                }
            );
        }

        function resetUploadUI() {
            document.getElementById('fileInput').value = '';
            document.getElementById('fileComment').value = '';
            document.getElementById('fileNameDisplay').innerText = "ファイルが選択されていません";
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = "アップロード開始";
            selectedFile = null;
        }

        // リアルタイムでファイル一覧を表示
        function loadFiles() {
            const listEl = document.getElementById('fileList');
            const q = query(collection(db, "upuroda_files"), orderBy("uploadedAt", "desc"));

            onSnapshot(q, (snapshot) => {
                listEl.innerHTML = '';
                if (snapshot.empty) {
                    listEl.innerHTML = '<div style="text-align: center; color: #71767b; padding: 20px;">まだファイルがありません。</div>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const dObj = data.uploadedAt ? data.uploadedAt.toDate() : new Date();
                    const timeStr = `${dObj.getFullYear()}/${dObj.getMonth()+1}/${dObj.getDate()} ${dObj.getHours()}:${String(dObj.getMinutes()).padStart(2, '0')}`;
                    const sizeStr = (data.fileSize / 1024).toFixed(1) + " KB";

                    const item = document.createElement('div');
                    item.className = 'file-item';
                    
                    let preview = '';
                    if(data.fileType.startsWith('image/')) {
                        preview = `<img src="${data.url}" style="max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 10px; object-fit: contain; background: #000;">`;
                    } else if(data.fileType.startsWith('video/')) {
                        preview = `<video src="${data.url}" controls style="max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 10px;"></video>`;
                    }

                    item.innerHTML = `
                        <div class="file-header">
                            <div class="file-title">${data.fileName}</div>
                            <div class="file-meta">${sizeStr}</div>
                        </div>
                        <div class="file-meta">アップロード: ${timeStr}</div>
                        ${data.comment ? `<div class="file-comment">💬 ${data.comment}</div>` : ''}
                        ${preview}
                        <div class="file-actions">
                            <a href="${data.url}" target="_blank" class="btn-action">開く / DL</a>
                            <button onclick="copyToClipboard('${data.url}')" class="btn-action copy">URLをコピー</button>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            });
        }

        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("URLをコピーしました！");
            }).catch(err => {
                alert("コピーに失敗しました");
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // 初期化時にファイル一覧を読み込む
        loadFiles();
    </script>
</body>
</html>
