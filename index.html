<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易SNS - ダークモード・引用リポスト版</title>
    <style>
        /* 📱 完全ダークモード対応のCSSへ刷新 */
        body { font-family: sans-serif; background-color: #000000; margin: 0; padding: 0; color: #e7e9ea; }
        .container { max-width: 600px; margin: 0 auto; background: #000000; min-height: 100vh; border-left: 1px solid #2f3336; border-right: 1px solid #2f3336; }
        
        .header-bar { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2f3336; background-color: rgba(0, 0, 0, 0.85); position: sticky; top: 0; backdrop-filter: blur(5px); z-index: 10; font-weight: bold; font-size: 18px; }
        .back-btn { background: none; border: none; cursor: pointer; margin-right: 15px; padding: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #e7e9ea; }
        .back-btn:hover { background-color: #181818; }

        .tabs { display: flex; border-bottom: 1px solid #2f3336; }
        .tab { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: #71767b; font-weight: bold; font-size: 16px; cursor: pointer; }
        .tab:hover { background-color: #181818; }
        .tab.active { color: #e7e9ea; border-bottom: 4px solid #1d9bf0; }

        .post-box { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; gap: 12px; }
        .post-box-right { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; border: none; resize: none; font-size: 18px; outline: none; margin-bottom: 10px; box-sizing: border-box; background: transparent; color: #e7e9ea; }
        button.post-btn { align-self: flex-end; background-color: #1d9bf0; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        button.post-btn:hover { background-color: #1a8cd8; }
        
        .post { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; cursor: pointer; transition: background-color 0.2s, opacity 0.3s, transform 0.3s; position: relative; }
        .post:hover { background-color: #080808; }
        .post-left { margin-right: 12px; }
        .post-right { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        
        .user-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: #2f3336; }
        .user-name { font-weight: bold; font-size: 15px; color: #e7e9ea; }
        .user-name:hover { text-decoration: underline; }
        
        .post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; padding-right: 30px; position: relative; }
        .post-time { font-size: 12px; color: #71767b; }
        .post-content { font-size: 15px; white-space: pre-wrap; margin-bottom: 10px; line-height: 1.4; color: #e7e9ea; }
        .repost-label { font-size: 12px; color: #71767b; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }

        /* 💡 引用リポスト（上に乗る）ためのカードデザイン */
        .quote-box { border: 1px solid #2f3336; border-radius: 12px; padding: 12px; margin-top: 10px; margin-bottom: 10px; cursor: pointer; transition: background-color 0.2s; }
        .quote-box:hover { background-color: #080808; }
        .quote-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .quote-icon { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .quote-name { font-weight: bold; font-size: 13px; color: #e7e9ea; }
        .quote-content { font-size: 14px; color: #e7e9ea; white-space: pre-wrap; line-height: 1.4; }

        .icon { width: 18px; height: 18px; fill: currentColor; display: inline-block; vertical-align: middle; }

        .post-actions { display: flex; justify-content: space-between; max-width: 450px; margin-top: 5px; }
        .action-btn { background: none; border: none; color: #71767b; font-size: 13px; cursor: pointer; padding: 6px 10px; border-radius: 15px; display: flex; align-items: center; gap: 6px; transition: background-color 0.2s, color 0.2s; }
        .action-btn.reply:hover { background-color: #031018; color: #1d9bf0; }
        .action-btn.repost:hover { background-color: #05140c; color: #00ba7c; }
        .action-btn.like:hover { background-color: #200914; color: #f91880; }
        .action-btn.view:hover { background-color: #031018; color: #1d9bf0; }
        .action-btn.share:hover { background-color: #16181c; color: #1d9bf0; }

        .menu-trigger { position: absolute; right: 0; top: 0; background: none; border: none; color: #71767b; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; transition: background-color 0.2s, color 0.2s; }
        .menu-trigger:hover { background-color: #031018; color: #1d9bf0; }

        .dropdown-menu { display: none; position: absolute; right: 0; top: 35px; background: #000000; border: 1px solid #2f3336; border-radius: 12px; box-shadow: 0 0 15px rgba(255,255,255,0.1); z-index: 20; width: 180px; overflow: hidden; padding: 5px 0; }
        .menu-item { padding: 12px 16px; font-size: 14px; color: #e7e9ea; cursor: pointer; display: flex; align-items: center; gap: 10px; text-align: left; transition: background-color 0.2s; }
        .menu-item:hover { background-color: #16181c; }
        .menu-item.danger { color: #f91880; }
        .menu-item.danger:hover { background-color: #200914; }

        .detail-main-user { display: flex; align-items: center; padding: 20px 20px 10px 20px; gap: 12px; position: relative; }
        .detail-main-post { padding: 10px 20px 20px 20px; border-bottom: 1px solid #2f3336; font-size: 22px; line-height: 1.4; color: #e7e9ea; }
        .detail-main-time { padding: 15px 20px; color: #71767b; font-size: 14px; border-bottom: 1px solid #2f3336; }
        .detail-reply-box { padding: 15px; border-bottom: 1px solid #2f3336; background-color: #000000; display: flex; gap: 12px; }
        .reply-list { padding: 0; }
        .reply-item { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; transition: background-color 0.2s; }
        .reply-item.clickable:hover { background-color: #080808; }
        
        .file-input-label { display: flex; align-items: center; gap: 8px; background-color: #1d9bf0; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; text-align: center; transition: background-color 0.2s; justify-content: center; }
        .file-input-label:hover { background-color: #1a8cd8; }
        #profileFile { display: none; }
        input[type="text"] { background-color: transparent; color: #e7e9ea; }
        
        .view-section { display: none; }
        .error-box { padding: 20px; margin: 15px; border: 2px solid #f91880; background-color: #200914; color: #f91880; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body onclick="closeAllMenus()">

    <div class="container">

        <div id="homeView" class="view-section">
            <div class="header-bar">ホーム</div>
            <div class="tabs">
                <div class="tab active" onclick="showHome()">タイムライン</div>
                <div class="tab" id="notificationLink" onclick="showNotifications()">通知</div>
                <div class="tab" onclick="showSettings()">設定</div>
            </div>
            
            <div class="post-box">
                <div onclick="showUserProfile(myProfile.id, event)" style="cursor:pointer;"><img src="" class="user-icon my-current-icon"></div>
                <div class="post-box-right">
                    <textarea id="postText" rows="3" placeholder="いまどうしてる？"></textarea>
                    <button class="post-btn" onclick="submitPost()">ポストする</button>
                </div>
            </div>
            <div id="timeline"></div>
        </div>

        <div id="detailView" class="view-section">
            <div class="header-bar">
                <button class="back-btn" onclick="showHome()">
                    <svg class="icon" style="width:22px; height:22px;" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span>ポスト</span>
            </div>
            <div class="detail-main-user">
                <img src="" id="detailUserIcon" class="user-icon" style="cursor:pointer; z-index:2; position:relative;">
                <div id="detailUserName" class="user-name" style="font-size: 16px; cursor:pointer; z-index:2; position:relative;"></div>
                <button class="menu-trigger" id="detailMenuTrigger"></button>
                <div id="detailDropdownMenu" class="dropdown-menu"></div>
            </div>
            <div id="detailPostContent" class="detail-main-post"></div>
            <div id="detailPostTime" class="detail-main-time"></div>
            <div style="padding: 10px 20px; border-bottom: 1px solid #2f3336;" id="detailPostActions"></div>

            <div class="detail-reply-box">
                <div><img src="" class="user-icon my-current-icon"></div>
                <div class="post-box-right">
                    <textarea id="detailReplyText" rows="2" placeholder="返信をポスト..."></textarea>
                    <button class="post-btn" id="submitReplyBtn">返信</button>
                </div>
            </div>
            <div id="detailReplyList"></div>
        </div>

        <div id="notificationView" class="view-section">
            <div class="header-bar">
                <button class="back-btn" onclick="showHome()">
                    <svg class="icon" style="width:22px; height:22px;" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span>通知</span>
            </div>
            <div class="tabs">
                <div class="tab" onclick="showHome()">タイムライン</div>
                <div class="tab active" id="notificationLinkActive">すべての通知</div>
                <div class="tab" onclick="showSettings()">設定</div>
            </div>
            <div id="notificationList"></div>
        </div>

        <div id="userProfileView" class="view-section">
            <div class="header-bar">
                <button class="back-btn" onclick="showHome()">
                    <svg class="icon" style="width:22px; height:22px;" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span>プロフィール</span>
            </div>
            <div id="userProfileHeader"></div>
            <div id="userProfileTimeline"></div>
        </div>

        <div id="settingsView" class="view-section">
            <div class="header-bar">
                <button class="back-btn" onclick="showHome()">
                    <svg class="icon" style="width:22px; height:22px;" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span>設定</span>
            </div>
            <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
                <div style="display: flex; flex-direction: column; gap: 8px; align-items: center;">
                    <label style="font-weight: bold; color: #71767b;">アイコンプレビュー</label>
                    <img src="" id="profileIconPreview" class="user-icon" style="width: 80px; height: 80px; margin-bottom: 10px;">
                    <label for="profileFile" class="file-input-label">
                        <svg class="icon" style="width:20px; height:20px;" viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                        画像をアップロード
                    </label>
                    <input type="file" id="profileFile" accept="image/*" onchange="handleImageUpload(event)">
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-weight: bold; color: #71767b;">ニックネーム</label>
                    <input type="text" id="profileName" style="padding: 12px; border: 1px solid #2f3336; border-radius: 8px; font-size: 16px; outline: none;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-weight: bold; color: #71767b;">または画像のURLを入力</label>
                    <input type="text" id="profileIcon" style="padding: 12px; border: 1px solid #2f3336; border-radius: 8px; font-size: 16px; outline: none;" oninput="document.getElementById('profileIconPreview').src = this.value">
                </div>
                <button class="post-btn" onclick="saveSettings()" style="width: 100%; padding: 12px; border-radius: 25px; font-size: 16px;">設定を保存</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDoc, getDocs, doc, query, orderBy, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // SVGアイコンデータ
        const svgReply    = `<svg class="icon" viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>`;
        const svgRepost   = `<svg class="icon" viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>`;
        const svgLike     = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        const svgShare    = `<svg class="icon" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>`;
        const svgView     = `<svg class="icon" viewBox="0 0 24 24"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"/></svg>`;
        const svgMenu     = `<svg class="icon" viewBox="0 0 24 24"><path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>`;
        const svgLink     = `<svg class="icon" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.31 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>`;
        const svgDislike  = `<svg class="icon" viewBox="0 0 24 24"><path d="M10.8 21h-4.3c-.6 0-1-.4-1-1v-8.6c0-.3.1-.5.3-.7l5.4-5.4c.4-.4 1-.4 1.4 0l.5.5c.3.3.4.7.2 1.1l-1.1 3.1h5.2c.6 0 1 .4 1 1v2.2c0 .2 0 .3-.1.5l-2.9 6.7c-.2.5-.7.8-1.2.8z"/></svg>`;
        const svgMute     = `<svg class="icon" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;
        const svgRestrict = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/></svg>`;
        const svgBlock    = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm4.9-3.1L5.69 5.69C7.04 4.63 8.74 4 12 4c4.41 0 8 3.59 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>`
        const svgWarning  = `<svg class="icon" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`;

        const firebaseConfig = {
            apiKey: "AIzaSyBCQArL0Q1wDveRywCpet5Nor3PuRYt7fM",
            authDomain: "sabopennet.firebaseapp.com",
            projectId: "sabopennet",
            storageBucket: "sabopennet.firebasestorage.app",
            messagingSenderId: "284308308452",
            appId: "1:284308308452:web:e36dd991e55a0e60e4c7f1",
            measurementId: "G-K17XRK5KRN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const defaultIcon = "https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=150&h=150&fit=crop";
        let myProfile = JSON.parse(localStorage.getItem('mySNS_profile')) || {};
        if (!myProfile.id) {
            myProfile.id = "user_" + Math.random().toString(36).substring(2, 12);
            myProfile.name = "ゲストユーザー";
            myProfile.icon = defaultIcon;
            localStorage.setItem('mySNS_profile', JSON.stringify(myProfile));
        }

        let currentDetailPostUserId = "";
        let uploadedImageBase64 = "";

        // 💡 投稿組み立て関数（引用リポストのカード化に対応）
        function createPostHTML(postId, post, uId, uName, uIcon, date, safeContent, encodedContent, isRepost, repLabel, viewCount) {
            let quoteBoxHTML = "";
            
            // 引用リポストだった場合、元の投稿を枠で囲んで表示する
            if (post.isQuoteRepost && post.originalPost) {
                const orig = post.originalPost;
                const safeOrigContent = (orig.content || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                quoteBoxHTML = `
                    <div class="quote-box" onclick="showPostDetail('${orig.postId}'); event.stopPropagation();">
                        <div class="quote-header">
                            <img src="${orig.userIcon || defaultIcon}" class="quote-icon">
                            <span class="quote-name">${orig.userName}</span>
                        </div>
                        <div class="quote-content">${safeOrigContent}</div>
                    </div>
                `;
            }

            return `
                <div class="post-right" style="padding-left:0; width:100%;">
                    ${repLabel}
                    <div style="display:flex;">
                        <div class="post-left" onclick="showUserProfile('${uId}', event)" style="z-index:2; position:relative;"><img src="${uIcon}" class="user-icon" style="cursor:pointer;"></div>
                        <div class="post-right">
                            <div class="post-header">
                                <span class="user-name" onclick="showUserProfile('${uId}', event)" style="z-index:2; position:relative; cursor:pointer;">${uName}</span>
                                <span class="post-time">${date}</span>
                                <button class="menu-trigger" onclick="togglePostMenu('${postId}', false, event)">${svgMenu}</button>
                                <div id="postMenu-${postId}" class="dropdown-menu">
                                    <div class="menu-item" onclick="sharePost('${postId}', '${encodedContent}', event)">${svgLink} リンクをコピー</div>
                                    <div class="menu-item" onclick="handleMenuAction('${postId}', '${uId}', '${uName}', '興味なし', event)">${svgDislike} 興味なし</div>
                                    <div class="menu-item" onclick="handleMenuAction('${postId}', '${uId}', '${uName}', 'ミュート', event)">${svgMute} ミュート</div>
                                    <div class="menu-item" onclick="handleMenuAction('${postId}', '${uId}', '${uName}', '制限', event)">${svgRestrict} 制限する</div>
                                    <div class="menu-item" onclick="handleMenuAction('${postId}', '${uId}', '${uName}', 'ブロック', event)">${svgBlock} ブロック</div>
                                    <div class="menu-item danger" onclick="handleMenuAction('${postId}', '${uId}', '${uName}', '報告', event)">${svgWarning} 報告する</div>
                                </div>
                            </div>
                            <div class="post-content">${safeContent}</div>
                            
                            ${quoteBoxHTML}
                            
                            <div class="post-actions">
                                <button class="action-btn reply">${svgReply}</button>
                                <button class="action-btn repost" onclick="repostPost('${postId}', event)">${svgRepost}</button>
                                <button class="action-btn like" onclick="likePost('${postId}', '${uId}', event)">${svgLike}</button>
                                <div class="action-btn view" title="閲覧数">${svgView} <span>${viewCount}</span></div>
                                <button class="action-btn share" onclick="sharePost('${postId}', '${encodedContent}', event)">${svgShare}</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateMyIconDisplays() {
            document.querySelectorAll('.my-current-icon').forEach(img => { img.src = myProfile.icon; });
        }

        window.handleImageUpload = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const size = 96; canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    const side = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, size, size);
                    uploadedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('profileIconPreview').src = uploadedImageBase64;
                    document.getElementById('profileIcon').value = "";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function isUserRestricted(userId) {
            try {
                const q = query(collection(db, "penalties"), where("targetUserId", "==", userId));
                const querySnapshot = await getDocs(q);
                const now = Date.now();
                const tenMinutesAgo = now - (10 * 60 * 1000);
                let activeCount = 0; let latestPenaltyTime = 0;
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const createdAt = data.createdAt ? data.createdAt.toDate().getTime() : 0;
                    if (createdAt >= tenMinutesAgo) { activeCount++; if (createdAt > latestPenaltyTime) { latestPenaltyTime = createdAt; } }
                });
                if (activeCount >= 10) {
                    const remainingMinutes = Math.ceil(((latestPenaltyTime + (10 * 60 * 1000)) - now) / (60 * 1000));
                    alert(`🙅 投稿制限中\n\n報告が多数寄せられたためロックされています。\nあと約 ${remainingMinutes} 分間は書き込めません。`);
                    return true;
                }
                return false;
            } catch (e) { return false; }
        }

        // 💡 【重要】引用リポストと通常リポストを分岐してDBに保存する処理
        window.repostPost = async function(postId, event) {
            if (event) { event.stopPropagation(); event.cancelBubble = true; }
            if (await isUserRestricted(myProfile.id)) return;
            
            try {
                // DBから元の投稿データを取得
                const docRef = doc(db, "posts", postId);
                const docSnap = await getDoc(docRef);
                if (!docSnap.exists()) { alert("元の投稿が見つかりません。"); return; }
                
                const origPost = docSnap.data();
                const targetUserId = origPost.userId;
                
                if (targetUserId === myProfile.id) { alert("自分のポストはリポストできません。"); return; }
                
                // 💡 入力窓を表示して、引用リポストかどうかを判定
                const comment = prompt("引用リポストしますか？\nコメントを入力してください。（空欄のままOKを押すと通常のリポストになります）");
                if (comment === null) return; // キャンセル
                
                if (comment.trim() === "") {
                    // 通常のリポスト（元の投稿者のアイコンと名前を維持して流す）
                    await addDoc(collection(db, "posts"), {
                        content: origPost.content, createdAt: new Date(), userId: targetUserId, userName: origPost.userName, userIcon: origPost.userIcon, isRepost: true, repostedBy: myProfile.name, views: 0
                    });
                } else {
                    // 引用リポスト（自分の投稿として記録し、元の投稿データを内包する）
                    await addDoc(collection(db, "posts"), {
                        content: comment.trim(), createdAt: new Date(), userId: myProfile.id, userName: myProfile.name, userIcon: myProfile.icon, isQuoteRepost: true, views: 0,
                        originalPost: {
                            postId: postId, userId: targetUserId, userName: origPost.userName, userIcon: origPost.userIcon, content: origPost.content
                        }
                    });
                }

                await addDoc(collection(db, "notifications"), { type: "repost", postId: postId, senderId: myProfile.id, senderName: myProfile.name, senderIcon: myProfile.icon, targetUserId: targetUserId, createdAt: new Date() });
                
                alert("ポストをリポストしました！");
                checkRouting(); // 今いる画面に合わせて再読み込み
            } catch(e) { alert("エラー: " + e.message); }
        }

                let list = JSON.parse(localStorage.getItem('mySNS_notInterestedPosts')) || []; list.push(postId); localStorage.setItem('mySNS_notInterestedPosts', JSON.stringify(list)); animateRemovePost(postId);
            } else if (actionType === 'ミュート') {
                let list = JSON.parse(localStorage.getItem('mySNS_mutedUsers')) || []; list.push(targetUserId); localStorage.setItem('mySNS_mutedUsers', JSON.stringify(list)); animateRemovePost(postId);
            } else if (actionType === 'ブロック') {
                let list = JSON.parse(localStorage.getItem('mySNS_blockedUsers')) || []; list.push(targetUserId); localStorage.setItem('mySNS_blockedUsers', JSON.stringify(list)); animateRemovePost(postId);
            } else if (actionType === '制限' || actionType === '報告') {
                addDoc(collection(db, "penalties"), { targetUserId: targetUserId, type: actionType, createdAt: new Date() }); alert(`送信しました。`);
            }
        }
        function animateRemovePost(postId) {
            const postDom = document.getElementById(`postDom-${postId}`); if (postDom) { postDom.style.opacity = '0'; postDom.style.transform = 'scale(0.95)'; setTimeout(() => { postDom.style.display = 'none'; }, 300); }
            if (document.getElementById('detailView').style.display === 'block') { showHome(); }
        }

        window.sharePost = function(postId, encodedContent, event) {
            const ev = event || window.event; if (ev) { if (ev.stopPropagation) ev.stopPropagation(); ev.cancelBubble = true; }
            closeAllMenus();
            const content = decodeURIComponent(encodedContent); const randomString = Math.random().toString(36).substring(2, 12);
            let baseUrl = window.location.origin + window.location.pathname; if (baseUrl.endsWith('/')) { baseUrl = baseUrl.slice(0, -1); }
            const params = new URLSearchParams(); params.append('id', postId); params.append('ref', randomString);
            const shareUrl = `${baseUrl}?${params.toString()}`; const shareText = `${content}\n\n${shareUrl}`;
            navigator.clipboard.writeText(shareText).then(() => { alert("リンクをコピーしました！"); });
        }

        // 初期起動
        checkRouting();
    </script>
</body>
</html>
