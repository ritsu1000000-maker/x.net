<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易SNS - メンション・DM・フォロー対応版</title>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        /* 既存のCSS（省略せずに記述） */
        body { font-family: sans-serif; background-color: #000000; margin: 0; padding: 0; color: #e7e9ea; }
        .layout-wrapper { display: flex; justify-content: center; max-width: 950px; margin: 0 auto; gap: 30px; }
        .container { width: 100%; max-width: 600px; background: #000000; min-height: 100vh; border-left: 1px solid #2f3336; border-right: 1px solid #2f3336; position: relative; }
        .sidebar { width: 320px; padding-top: 15px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: none; }
        @media (min-width: 950px) { .sidebar { display: block; } }
        .sidebar-box { background-color: #16181c; border-radius: 16px; padding: 15px; border: 1px solid #2f3336; margin-bottom: 20px; }
        .sidebar-box h3 { margin-top: 0; margin-bottom: 15px; font-size: 20px; color: #e7e9ea; }
        .sidebar-trend-item { padding: 10px 12px; margin: 0 -12px; cursor: pointer; transition: background-color 0.2s; border-radius: 8px; }
        .sidebar-trend-item:hover { background-color: #1d9bf011; }
        .sidebar-trend-rank { color: #71767b; font-size: 13px; margin-bottom: 2px; }
        .sidebar-trend-name { font-weight: bold; font-size: 15px; color: #1d9bf0; margin-bottom: 2px; word-break: break-all; }
        .sidebar-trend-count { color: #71767b; font-size: 13px; }
        .header-bar { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2f3336; background-color: rgba(0, 0, 0, 0.85); position: sticky; top: 0; backdrop-filter: blur(5px); z-index: 10; font-weight: bold; font-size: 18px; }
        .back-btn { background: none; border: none; cursor: pointer; margin-right: 15px; padding: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #e7e9ea; }
        .back-btn:hover { background-color: #181818; }
        .tabs { display: flex; border-bottom: 1px solid #2f3336; overflow-x: auto; white-space: nowrap; }
        .tab { flex: 1; text-align: center; padding: 15px 10px; text-decoration: none; color: #71767b; font-weight: bold; font-size: 15px; cursor: pointer; min-width: 70px; }
        .tab:hover { background-color: #181818; }
        .tab.active { color: #e7e9ea; border-bottom: 4px solid #1d9bf0; }
        .post-box { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; gap: 12px; }
        .post-box-right { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; border: none; resize: none; font-size: 18px; outline: none; margin-bottom: 10px; box-sizing: border-box; background: transparent; color: #e7e9ea; }
        .video-input-field { width: 100%; border: 1px solid #2f3336; border-radius: 8px; padding: 10px; background: transparent; color: #e7e9ea; margin-bottom: 10px; box-sizing: border-box; display: none; font-size: 14px; }
        .video-input-field:focus { border-color: #1d9bf0; outline: none; }
        .toolbar-btn { background: transparent; border: 1px solid #2f3336; color: #1d9bf0; font-size: 13px; font-weight: bold; cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .toolbar-btn:hover { background-color: #031018; }
        button.post-btn { background-color: #1d9bf0; color: white; border: none; border-radius: 20px; padding: 8px 18px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        button.post-btn:hover { background-color: #1a8cd8; }
        .post { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; cursor: pointer; transition: background-color 0.2s; position: relative; }
        .post:hover { background-color: #080808; }
        .post-left { margin-right: 12px; flex-shrink: 0; }
        .post-right { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; min-width: 0; }
        .user-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: #2f3336; }
        .user-name { font-weight: bold; font-size: 15px; color: #e7e9ea; }
        .user-name:hover { text-decoration: underline; }
        .user-handle { color: #71767b; font-size: 15px; margin-left: 4px; font-weight: normal; }
        .post-header { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; flex-wrap: wrap; padding-right: 30px; }
        .post-time { font-size: 15px; color: #71767b; }
        .post-content { font-size: 15px; white-space: pre-wrap; margin-bottom: 10px; line-height: 1.4; color: #e7e9ea; word-break: break-all; }
        .hashtag { color: #1d9bf0; cursor: pointer; }
        .hashtag:hover { text-decoration: underline; }
        
        /* アイコンSVG用 */
        .icon { width: 18px; height: 18px; fill: currentColor; display: inline-block; vertical-align: middle; }
        .post-actions { display: flex; justify-content: space-between; max-width: 450px; margin-top: 5px; }
        .action-btn { background: none; border: none; color: #71767b; font-size: 13px; cursor: pointer; padding: 6px 10px; border-radius: 15px; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .action-btn.like:hover { background-color: #200914; color: #f91880; }
        
        /* モーダル＆トースト */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background-color: #1d9bf0; color: white; padding: 12px 24px; border-radius: 25px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .top-notification { position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background-color: #1d9bf0; color: white; padding: 12px 24px; border-radius: 25px; z-index: 10001; transition: top 0.4s; pointer-events: none; }
        .top-notification.show { top: 20px; }
        .view-section { display: none; }
        
        /* 新機能用のCSS：DM・チャット画面 */
        .dm-bubble { max-width: 75%; padding: 10px 14px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-break: break-all; }
        .dm-bubble.mine { background-color: #1d9bf0; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .dm-bubble.other { background-color: #2f3336; color: #e7e9ea; align-self: flex-start; border-bottom-left-radius: 4px; }
        .search-input-box { display: flex; padding: 15px; border-bottom: 1px solid #2f3336; gap: 10px; }
        .search-input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #2f3336; background: transparent; color: #e7e9ea; font-size: 16px; outline: none; }
        .search-input:focus { border-color: #1d9bf0; }
    </style>
</head>
<body>

    <div id="customToast" class="toast"></div>
    <div id="topNotification" class="top-notification"></div>

    <div class="layout-wrapper">
        <div class="container">
            <div id="navContainer"></div>

            <div id="homeView" class="view-section">
                <div class="post-box">
                    <div onclick="showUserProfile(myProfile.id, event)" style="cursor:pointer;"><img src="" class="user-icon my-current-icon"></div>
                    <div class="post-box-right">
                        <textarea id="postText" rows="3" placeholder="いまどうしてる？ (@ユーザー名 でメンション、@AI でAI呼び出し)"></textarea>
                        <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                            <button class="post-btn" onclick="submitPost()">ポスト</button>
                        </div>
                    </div>
                </div>
                <div id="timeline"></div>
            </div>

            <div id="searchView" class="view-section">
                <div class="search-input-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="キーワード、#ハッシュタグ、@ユーザー を検索" onkeydown="if(event.key==='Enter') executeSearch(this.value)">
                    <button class="post-btn" onclick="executeSearch(document.getElementById('searchInput').value)">検索</button>
                </div>
                <div id="searchResults"></div>
            </div>

            <div id="notificationView" class="view-section">
                <div id="notificationList"></div>
            </div>

            <div id="messagesView" class="view-section">
                <div id="dmListArea"></div>
            </div>

            <div id="chatRoomView" class="view-section" style="display:flex; flex-direction:column; height: 100vh;">
                <div id="chatMessages" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
                <div class="search-input-box" style="background:#000; padding:10px 15px;">
                    <input type="text" id="dmInput" class="search-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter') sendDM()">
                    <button class="post-btn" onclick="sendDM()">送信</button>
                </div>
            </div>

            <div id="detailView" class="view-section">
                <div id="detailContentArea"></div>
            </div>

            <div id="userProfileView" class="view-section">
                <div id="userProfileHeader"></div>
                <div id="userProfileTimeline"></div>
            </div>

            <div id="settingsView" class="view-section">
                <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; flex-direction: column; gap: 8px; align-items: center;">
                        <img src="" id="profileIconPreview" class="user-icon" style="width: 80px; height: 80px; margin-bottom: 10px;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-weight: bold; color: #71767b;">ニックネーム</label>
                        <input type="text" id="profileName" style="padding: 12px; border: 1px solid #2f3336; border-radius: 8px; font-size: 16px; outline: none; background: transparent; color: #e7e9ea;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-weight: bold; color: #71767b;">画像URL（任意）</label>
                        <input type="text" id="profileIcon" style="padding: 12px; border: 1px solid #2f3336; border-radius: 8px; font-size: 16px; outline: none; background: transparent; color: #e7e9ea;" oninput="document.getElementById('profileIconPreview').src = this.value">
                    </div>
                    <button class="post-btn" onclick="saveSettings()">プロフィールを保存</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        // 💡 setDoc, deleteDoc を追加でインポート（フォロー・ユーザー登録用）
        import { getFirestore, collection, addDoc, getDoc, getDocs, doc, query, orderBy, where, updateDoc, increment, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        
        // SVG Icons
        const svgReply = `<svg class="icon" viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>`;
        const svgLike  = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        const svgBack  = `<svg class="icon" style="width:22px; height:22px;" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>`;

        window.showToast = function(msg) { const toast = document.getElementById('customToast'); toast.innerText = msg; toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 3000); }
        window.showTopNotification = function(msg) { const topAlert = document.getElementById('topNotification'); topAlert.innerHTML = msg; topAlert.classList.add('show'); setTimeout(() => { topAlert.classList.remove('show'); }, 4000); }

        // Firebase設定
        const firebaseConfig = { apiKey: "AIzaSyBCQArL0Q1wDveRywCpet5Nor3PuRYt7fM", authDomain: "sabopennet.firebaseapp.com", projectId: "sabopennet", storageBucket: "sabopennet.firebasestorage.app", messagingSenderId: "284308308452", appId: "1:284308308452:web:e36dd991e55a0e60e4c7f1" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // ユーザープロファイル管理
        const defaultIcon = "https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=150&h=150&fit=crop";
        let myProfile = JSON.parse(localStorage.getItem('mySNS_profile')) || {};
        if (!myProfile.id) { myProfile.id = "user_" + Math.random().toString(36).substring(2, 12); myProfile.name = "ゲストユーザー"; myProfile.icon = defaultIcon; localStorage.setItem('mySNS_profile', JSON.stringify(myProfile)); }

        window.updateMyIconDisplays = function(){ document.querySelectorAll('.my-current-icon').forEach(i=>i.src=myProfile.icon); }

        // 💡 追加：ユーザー情報をFirestoreにも保存・更新する（メンションや検索でヒットさせるため）
        window.syncMyProfile = async function() {
            try {
                await setDoc(doc(db, "users", myProfile.id), {
                    id: myProfile.id,
                    name: myProfile.name,
                    icon: myProfile.icon,
                    updatedAt: new Date()
                }, { merge: true });
            } catch(e) { console.error("Profile sync error", e); }
        }
        syncMyProfile(); // 起動時に同期

        // 文字列の解析（メンションやハッシュタグをリンク化）
        function parseContent(text) {
            let safe = (text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            // ハッシュタグ
            safe = safe.replace(/(^|\s)([#＃][^\s<]+)/g, function(match, space, tag) {
                return `${space}<span class="hashtag" onclick="executeSearch('${tag}', event)">${tag}</span>`;
            });
            // 💡 追加：メンション (@ユーザー名) をリンク化
            safe = safe.replace(/@([^\s<]+)/g, '<span class="hashtag" onclick="executeSearch(\'@$1\', event)">@$1</span>');
            return safe;
        }

        // ナビゲーション描画
        function renderNav(activeTab, title = "ホーム", showBack = false) {
            const backBtn = showBack ? `<button class="back-btn" onclick="window.history.back()">${svgBack}</button>` : '';
            document.getElementById('navContainer').innerHTML = `
                <div class="header-bar">${backBtn}<span>${title}</span></div>
                <div class="tabs">
                    <div class="tab ${activeTab==='home'?'active':''}" onclick="showHome()">ホーム</div>
                    <div class="tab ${activeTab==='search'?'active':''}" onclick="showSearch()">検索</div>
                    <div class="tab ${activeTab==='notify'?'active':''}" onclick="showNotifications()">通知</div>
                    <div class="tab ${activeTab==='messages'?'active':''}" onclick="showMessages()">DM</div>
                    <div class="tab ${activeTab==='settings'?'active':''}" onclick="showSettings()">設定</div>
                </div>
            `;
        }

        let unsubscribePosts = null;
        let unsubscribeChat = null;

        // ルーティング（画面切り替え）
        window.checkRouting = async function() {
            if (unsubscribePosts) { unsubscribePosts(); unsubscribePosts = null; }
            if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }

            const params = new URLSearchParams(window.location.search);
            const view = params.get('view'); const id = params.get('id'); const user = params.get('user'); const chat = params.get('chat');
            document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
            updateMyIconDisplays();

            if (id) {
                renderNav('', 'ポスト', true); document.getElementById('detailView').style.display = 'block'; await renderPostDetail(id);
            } else if (user) {
                renderNav('', 'プロフィール', true); document.getElementById('userProfileView').style.display = 'block'; await renderUserProfile(user);
            } else if (chat) {
                // 💡 追加：チャットルーム表示
                renderNav('', 'メッセージ', true); document.getElementById('chatRoomView').style.display = 'flex'; renderChatRoom(chat);
            } else if (view === 'search') {
                renderNav('search', '検索'); document.getElementById('searchView').style.display = 'block';
                const q = params.get('q') || ''; document.getElementById('searchInput').value = q;
                if(q) { renderSearchResults(q); }
            } else if (view === 'messages') {
                // 💡 追加：DM一覧表示
                renderNav('messages', 'ダイレクトメッセージ'); document.getElementById('messagesView').style.display = 'block'; renderDMList();
            } else if (view === 'notifications') {
                renderNav('notify', '通知'); document.getElementById('notificationView').style.display = 'block'; await renderNotifications();
            } else if (view === 'settings') {
                renderNav('settings', '設定'); document.getElementById('settingsView').style.display = 'block'; renderSettings();
            } else {
                renderNav('home', 'ホーム'); document.getElementById('homeView').style.display = 'block'; renderPosts();
            }
        }
        
        window.showHome = function() { window.history.pushState({}, '', window.location.pathname); checkRouting(); }
        window.showSearch = function() { window.history.pushState({}, '', '?view=search'); checkRouting(); }
        window.showNotifications = function() { window.history.pushState({}, '', '?view=notifications'); checkRouting(); }
        window.showMessages = function() { window.history.pushState({}, '', '?view=messages'); checkRouting(); }
        window.showSettings = function() { window.history.pushState({}, '', '?view=settings'); checkRouting(); }
        window.showUserProfile = function(uid, ev) { if(ev){ev.stopPropagation();} window.history.pushState({}, '', `?user=${uid}`); checkRouting(); }
        window.showPostDetail = function(pid) { window.history.pushState({}, '', `?id=${pid}`); checkRouting(); }
        window.openChat = function(uid) { window.history.pushState({}, '', `?chat=${uid}`); checkRouting(); }
        window.addEventListener('popstate', checkRouting);

        // --- 検索機能 ---
        window.executeSearch = function(keyword, event) {
            if(event) { event.stopPropagation(); event.cancelBubble=true; }
            const kw = keyword.trim(); if(!kw) return;
            window.history.pushState({}, '', `?view=search&q=${encodeURIComponent(kw)}`); checkRouting();
        }

        window.renderSearchResults = async function(keyword) {
            const list = document.getElementById('searchResults'); list.innerHTML = '<div style="padding:20px; color:#71767b;">検索中...</div>';
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q); let found = 0; list.innerHTML = '';
                
                // メンション検索用（@を外す）
                const searchName = keyword.startsWith('@') ? keyword.substring(1).toLowerCase() : keyword.toLowerCase();

                snap.forEach(docSnap => {
                    const post = docSnap.data();
                    const textMatch = post.content && post.content.toLowerCase().includes(keyword.toLowerCase());
                    const nameMatch = post.userName && post.userName.toLowerCase().includes(searchName);
                    if (textMatch || nameMatch) {
                        found++; list.appendChild(createPostElement(docSnap.id, post, post.userId));
                    }
                });
                if(found === 0) list.innerHTML = '<div style="padding:30px; text-align:center; color:#71767b;">見つかりませんでした。</div>';
            } catch(e) { list.innerHTML = `検索エラー: ${e.message}`; }
        }

        // --- フォロー機能 & プロフィール画面 ---
        window.toggleFollow = async function(targetUid) {
            if(targetUid === myProfile.id) return;
            const followId = `${myProfile.id}_${targetUid}`;
            const ref = doc(db, "follows", followId);
            try {
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    await deleteDoc(ref);
                    showToast("フォロー解除しました");
                } else {
                    await setDoc(ref, { follower: myProfile.id, following: targetUid, createdAt: new Date() });
                    showToast("フォローしました！");
                    // 通知を飛ばす
                    await addDoc(collection(db, "notifications"), { type: "follow", senderId: myProfile.id, senderName: myProfile.name, senderIcon: myProfile.icon, targetUserId: targetUid, createdAt: new Date() });
                }
                renderUserProfile(targetUid); // 再描画
            } catch(e) { console.error(e); }
        }

        window.renderUserProfile = async function(uid) {
            const header = document.getElementById('userProfileHeader'); const tl = document.getElementById('userProfileTimeline');
            header.innerHTML = ''; tl.innerHTML = '<div style="padding:15px;">読込中...</div>';
            try {
                // DBからユーザー最新情報を取得
                let uName = "名無し"; let uIcon = defaultIcon;
                const uSnap = await getDoc(doc(db, "users", uid));
                if(uSnap.exists()){ uName = uSnap.data().name; uIcon = uSnap.data().icon; }

                // フォロー／フォロワー数を取得
                const followingSnap = await getDocs(query(collection(db, "follows"), where("follower", "==", uid)));
                const followerSnap = await getDocs(query(collection(db, "follows"), where("following", "==", uid)));
                
                let actionBtns = '';
                if(uid !== myProfile.id) {
                    const isFollowing = followerSnap.docs.some(d => d.data().follower === myProfile.id);
                    actionBtns = `
                        <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
                            <button class="post-btn" style="${isFollowing ? 'background:transparent; border:1px solid #71767b; color:#e7e9ea;' : ''}" onclick="toggleFollow('${uid}')">${isFollowing ? 'フォロー中' : 'フォローする'}</button>
                            <button class="post-btn" style="background:transparent; border:1px solid #1d9bf0; color:#1d9bf0;" onclick="openChat('${uid}')">メッセージ(DM)</button>
                        </div>
                    `;
                }

                header.innerHTML = `
                    <div style="padding:30px 20px; text-align:center; border-bottom:1px solid #2f3336;">
                        <img src="${uIcon}" class="user-icon" style="width:90px; height:90px; border:3px solid #000;">
                        <div style="font-size:22px; font-weight:bold; margin-top:10px;">${uName}</div>
                        <div style="color:#71767b; font-size:14px; margin-top:4px;">@${uid.substring(0,8)}</div>
                        <div style="display:flex; justify-content:center; gap:15px; margin-top:12px; font-size:14px;">
                            <div><strong style="color:#e7e9ea;">${followingSnap.size}</strong> <span style="color:#71767b;">フォロー中</span></div>
                            <div><strong style="color:#e7e9ea;">${followerSnap.size}</strong> <span style="color:#71767b;">フォロワー</span></div>
                        </div>
                        ${actionBtns}
                    </div>
                `;

                // タイムライン描画
                const postSnap = await getDocs(query(collection(db, "posts"), where("userId", "==", uid)));
                let posts = []; postSnap.forEach(d => posts.push({id:d.id, ...d.data()}));
                posts.sort((a,b)=>b.createdAt.toDate() - a.createdAt.toDate());
                tl.innerHTML = ''; 
                if(posts.length===0) tl.innerHTML='<div style="padding:20px; text-align:center;">投稿がありません。</div>';
                posts.forEach(p => tl.appendChild(createPostElement(p.id, p, p.userId)));
            } catch(e) { tl.innerHTML = `エラー: ${e.message}`; }
        }

        // --- DM（ダイレクトメッセージ）機能 ---
        window.renderDMList = async function() {
            const area = document.getElementById('dmListArea');
            area.innerHTML = '<div style="padding:15px; color:#71767b;">読込中...</div>';
            try {
                // DM画面には「自分がフォローしている人」をリストアップする
                const followingSnap = await getDocs(query(collection(db, "follows"), where("follower", "==", myProfile.id)));
                
                area.innerHTML = '<div style="padding:15px; font-weight:bold; border-bottom:1px solid #2f3336;">DMを送る相手（フォロー中）</div>';
                if (followingSnap.empty) {
                    area.innerHTML += '<div style="padding:30px; text-align:center; color:#71767b;">誰もフォローしていません。<br>プロフィールから誰かをフォローすると、ここに表示されてDMを送れます。</div>';
                    return;
                }

                for (let d of followingSnap.docs) {
                    const targetUid = d.data().following;
                    const uSnap = await getDoc(doc(db, "users", targetUid));
                    if(uSnap.exists()) {
                        const u = uSnap.data();
                        area.innerHTML += `
                            <div style="padding:15px; border-bottom:1px solid #2f3336; display:flex; align-items:center; gap:12px; cursor:pointer; transition:0.2s;" onmouseover="this.style.backgroundColor='#16181c'" onmouseout="this.style.backgroundColor='transparent'" onclick="openChat('${targetUid}')">
                                <img src="${u.icon || defaultIcon}" class="user-icon">
                                <div><div style="font-weight:bold; color:#e7e9ea;">${u.name}</div><div style="color:#71767b; font-size:14px;">@${targetUid.substring(0,8)}</div></div>
                            </div>
                        `;
                    }
                }
            } catch(e){ area.innerHTML = `エラー: ${e.message}`; }
        }

        let currentChatTarget = null;
        window.renderChatRoom = function(targetUid) {
            currentChatTarget = targetUid;
            const area = document.getElementById('chatMessages');
            area.innerHTML = '<div style="color:#71767b; text-align:center;">通信中...</div>';
            
            // スレッドIDの生成（双方のIDをアルファベット順に繋げて一意にする）
            const threadId = myProfile.id < targetUid ? `${myProfile.id}_${targetUid}` : `${targetUid}_${myProfile.id}`;
            const q = query(collection(db, "dms"), where("threadId", "==", threadId), orderBy("createdAt", "asc"));

            unsubscribeChat = onSnapshot(q, (snap) => {
                area.innerHTML = '';
                if(snap.empty) {
                    area.innerHTML = '<div style="color:#71767b; text-align:center; margin-top:20px;">まだメッセージはありません。<br>挨拶を送ってみましょう！</div>';
                }
                snap.forEach(d => {
                    const msg = d.data();
                    const isMine = msg.sender === myProfile.id;
                    const safeText = (msg.text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    area.innerHTML += `<div class="dm-bubble ${isMine ? 'mine' : 'other'}">${safeText}</div>`;
                });
                area.scrollTop = area.scrollHeight; // 最新のメッセージまでスクロール
            });
        }

        window.sendDM = async function() {
            const input = document.getElementById('dmInput');
            const txt = input.value.trim();
            if(!txt || !currentChatTarget) return;

            input.value = '';
            const threadId = myProfile.id < currentChatTarget ? `${myProfile.id}_${currentChatTarget}` : `${currentChatTarget}_${myProfile.id}`;
            try {
                await addDoc(collection(db, "dms"), {
                    threadId: threadId,
                    sender: myProfile.id,
                    text: txt,
                    createdAt: new Date()
                });
            } catch(e) { console.error(e); showToast("送信失敗"); }
        }

        // --- タイムライン・ポスト処理 ---
        function createPostElement(postId, post, uId) {
            const dObj = post.createdAt ? post.createdAt.toDate() : new Date();
            const safeContent = parseContent(post.content);

            const div = document.createElement('div'); div.className = 'post'; div.id = `postDom-${postId}`; div.setAttribute('onclick', `showPostDetail('${postId}')`);
            div.innerHTML = `
                <div class="post-left" onclick="showUserProfile('${uId}', event)" style="z-index:2; position:relative;">
                    <img src="${post.userIcon||defaultIcon}" class="user-icon">
                </div>
                <div class="post-right">
                    <div class="post-header">
                        <span class="user-name" onclick="showUserProfile('${uId}', event)" style="z-index:2; position:relative;">${post.userName||'名無し'}</span>
                        <span class="user-handle">@${(uId||"").substring(0,8)}</span>
                    </div>
                    <div class="post-content">${safeContent}</div>
                    <div class="post-actions">
                        <button class="action-btn reply">${svgReply}</button>
                        <button class="action-btn like" onclick="likePost('${postId}', '${uId}', event)">${svgLike} <span id="like-count-${postId}">${post.likes>0?post.likes:''}</span></button>
                    </div>
                </div>
            `;
            return div;
        }

        window.submitPost = async function() {
            let txt = document.getElementById('postText').value.trim();
            if (!txt) return;

            let data = { content: txt, createdAt: new Date(), userId: myProfile.id, userName: myProfile.name, userIcon: myProfile.icon, likes: 0 };
            
            try {
                const docRef = await addDoc(collection(db, "posts"), data);
                document.getElementById('postText').value = ''; 
                showToast("ポストしました！");

                // 💡 追加：AIへのメンション検知
                if (txt.includes('@AI') || txt.includes('＠AI')) {
                    handleAIMention(txt, docRef.id);
                }

                // 💡 追加：ユーザーへのメンション検知＆通知
                const mentions = txt.match(/@([^\s ]+)/g);
                if (mentions) {
                    for (let m of mentions) {
                        const mName = m.substring(1); // @を省いた名前
                        if (mName.toUpperCase() === 'AI') continue; // AI宛てはスキップ
                        
                        // usersコレクションから同じ名前のユーザーを探して通知を送る
                        const uq = query(collection(db, "users"), where("name", "==", mName));
                        const usnap = await getDocs(uq);
                        usnap.forEach(udoc => {
                            addDoc(collection(db, "notifications"), {
                                type: "mention", postId: docRef.id,
                                senderId: myProfile.id, senderName: myProfile.name, senderIcon: myProfile.icon,
                                targetUserId: udoc.id, createdAt: new Date()
                            });
                        });
                    }
                }
            } catch (e) { showToast("エラーが発生しました"); }
        }

        // 💡 AIからの自動リプライ関数
        window.handleAIMention = async function(text, postId) {
            const question = text.replace(/@AI|＠AI/gi, '').trim();
            if (!question) return;
            showTopNotification("🤖 AIが返信を考えています...");
            try {
                const sysPrompt = "あなたはSNSのフレンドリーなAIアシスタントです。短く返信して:";
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(sysPrompt + "\n" + question)}`);
                if (!response.ok) throw new Error("APIエラー");
                const aiResponse = await response.text();

                await addDoc(collection(db, "replies"), {
                    postId: postId, content: aiResponse, createdAt: new Date(),
                    userId: "ai_bot", userName: "🤖 AIアシスタント",
                    userIcon: "https://api.dicebear.com/7.x/bottts/svg?seed=AI&backgroundColor=1d9bf0", likes: 0
                });
                showTopNotification("✨ AIから返信が届きました！");
                if (document.getElementById('detailReplyList')) loadReplies(postId);
            } catch (e) { showToast("🤖 AIの返信に失敗しました"); }
        }

        window.renderPosts = function() {
            const tl = document.getElementById('timeline');
            if (unsubscribePosts) unsubscribePosts();

            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            let isFirstLoad = true;

            unsubscribePosts = onSnapshot(q, (snapshot) => {
                if (isFirstLoad) {
                    tl.innerHTML = '';
                    if (snapshot.empty) tl.innerHTML = '<div style="padding:15px; color:#71767b;">まだ投稿がありません。</div>'; 
                    snapshot.forEach(docSnap => tl.appendChild(createPostElement(docSnap.id, docSnap.data(), docSnap.data().userId)));
                    isFirstLoad = false;
                } else {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === "added") tl.insertBefore(createPostElement(change.doc.id, change.doc.data(), change.doc.data().userId), tl.firstChild);
                    });
                }
            });
        }

        window.renderPostDetail = async function(postId) {
            const area = document.getElementById('detailContentArea'); area.innerHTML = '<div style="padding:20px;">読込中...</div>';
            try {
                const docSnap = await getDoc(doc(db, "posts", postId));
                if (docSnap.exists()) {
                    const post = docSnap.data();
                    const temp = createPostElement(postId, post, post.userId);
                    temp.style.borderBottom = 'none'; temp.className = '';
                    area.innerHTML = `
                        <div style="padding:15px; border-bottom: 1px solid #2f3336;">${temp.innerHTML}</div>
                        <div id="detailReplyList"></div>
                    `;
                    loadReplies(postId);
                } else { area.innerHTML = '<div style="padding:20px;">見つかりません。</div>'; }
            } catch(e) {}
        }

        window.loadReplies = async function(postId) {
            const list = document.getElementById('detailReplyList'); list.innerHTML = '<div style="padding:15px;">読込中...</div>';
            try {
                const snap = await getDocs(query(collection(db, "replies"), where("postId", "==", postId)));
                let arr = []; snap.forEach(d => arr.push({id: d.id, ...d.data()})); arr.sort((a,b)=>a.createdAt.toDate()-b.createdAt.toDate());
                list.innerHTML = ''; 
                if (arr.length === 0) { list.innerHTML = '<div style="padding:20px; color:#71767b; text-align:center;">返信はまだありません。</div>'; return; }
                
                arr.forEach(r => {
                    const safeUid = r.userId || "unknown";
                    const div = document.createElement('div'); div.style.cssText = 'padding:15px; border-bottom:1px solid #2f3336; display:flex;';
                    div.innerHTML = `
                        <div style="margin-right:12px; cursor:pointer;" onclick="showUserProfile('${safeUid}', event)"><img src="${r.userIcon || defaultIcon}" class="user-icon" style="width:40px; height:40px;"></div>
                        <div>
                            <div><span style="font-weight:bold;">${r.userName || '名無し'}</span> <span style="color:#71767b; font-size:14px;">@${safeUid.substring(0,8)}</span></div>
                            <div style="margin-top:5px; line-height:1.4;">${parseContent(r.content)}</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch(e) {}
        }

        window.likePost = async function(pid, uid, ev) {
            if(ev)ev.stopPropagation(); 
            if(uid === myProfile.id){ showToast("自分のポストはいいねできません"); return;} 
            
            try {
                await updateDoc(doc(db, "posts", pid), {likes: increment(1)});
                // いいね通知
                await addDoc(collection(db, "notifications"), { type: "like", postId: pid, senderId: myProfile.id, senderName: myProfile.name, senderIcon: myProfile.icon, targetUserId: uid, createdAt: new Date() });
                
                const span = document.getElementById(`like-count-${pid}`);
                if(span) { span.innerText = (parseInt(span.innerText) || 0) + 1; span.parentElement.style.color = '#f91880'; }
            } catch(e){}
        }

        // --- 通知一覧画面 ---
        window.renderNotifications = async function() {
            const list = document.getElementById('notificationList');
            list.innerHTML = '<div style="padding:20px; color:#71767b;">読込中...</div>';
            try {
                const q = query(collection(db, "notifications"), where("targetUserId", "==", myProfile.id), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                list.innerHTML = '';
                if (snap.empty) { list.innerHTML = '<div style="padding:30px; color:#71767b; text-align:center;">通知はありません。</div>'; return; }
                
                snap.forEach(docSnap => {
                    const n = docSnap.data();
                    let text = "";
                    let clickAction = `showUserProfile('${n.senderId}')`;

                    if (n.type === "like") { text = `<strong>${n.senderName}</strong> さんがあなたのポストをいいねしました💖`; clickAction = `showPostDetail('${n.postId}')`; }
                    else if (n.type === "follow") { text = `<strong>${n.senderName}</strong> さんがあなたをフォローしました👤`; }
                    else if (n.type === "mention") { text = `<strong>${n.senderName}</strong> さんがあなたをメンションしました🔔`; clickAction = `showPostDetail('${n.postId}')`; }

                    list.innerHTML += `
                        <div style="padding:15px; border-bottom:1px solid #2f3336; cursor:pointer; transition:0.2s;" onmouseover="this.style.backgroundColor='#16181c'" onmouseout="this.style.backgroundColor='transparent'" onclick="${clickAction}">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <img src="${n.senderIcon || defaultIcon}" class="user-icon" style="width:40px; height:40px;">
                                <div style="color:#e7e9ea; font-size:15px;">${text}</div>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { list.innerHTML = `エラー: ${e.message}`; }
        }

        // --- 設定画面 ---
        window.renderSettings=function(){ 
            document.getElementById('profileName').value=myProfile.name; 
            document.getElementById('profileIconPreview').src=myProfile.icon; 
        }
        window.saveSettings=function(){ 
            myProfile.name=document.getElementById('profileName').value; 
            const u=document.getElementById('profileIcon').value; if(u)myProfile.icon=u; 
            localStorage.setItem('mySNS_profile',JSON.stringify(myProfile)); 
            syncMyProfile(); // Firestore側にも最新プロフを同期
            showToast("保存しました"); checkRouting(); 
        }

        // 初回ルーティング実行
        checkRouting();
    </script>
</body>
</html>
