            link.download = `paint-chat-${Date.now()}.png`;
            link.href = sharedCanvas.toDataURL('image/png');

        };
        function startSharedPaintListener() {
            stopSharedPaintListener();
            if (!currentConversationUserId) return;
            
            const roomId = [myProfile.id, currentConversationUserId].sort().join('_');
            
            // 1. 最新のクリア時刻を取得するための監視
            const qClear = query(collection(db, "shared_clears"), where("roomId", "==", roomId));
            sharedCanvasListener = onSnapshot(qClear, (snapshot) => {
                let latestClear = 0;
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const clearTime = data.createdAt ? data.createdAt.toDate().getTime() : 0;
                    if (clearTime > latestClear) {
                        latestClear = clearTime;
                    }
                });
                
                if (latestClear > lastClearTime) {
                    lastClearTime = latestClear;
                    // キャンバスをクリアし、ストロークを再描画
                    if (sharedCtx) {
                        sharedCtx.fillStyle = '#ffffff';
                        sharedCtx.fillRect(0, 0, sharedCanvas.width, sharedCanvas.height);
                    }
                    receivedStrokesMap.clear();
                    // ストロークを再読み込み・再描画
                    reloadSharedStrokes();
                }
            });
            // 2. ストロークのリアルタイム受信
            const qStrokes = query(collection(db, "shared_strokes"), where("roomId", "==", roomId));
            sharedStrokesListener = onSnapshot(qStrokes, (snapshot) => {
                let newStrokes = [];
                snapshot.forEach(docSnap => {
                    const strokeId = docSnap.id;
                    const data = docSnap.data();
                    const strokeTime = data.createdAt ? data.createdAt.toDate().getTime() : 0;
                    
                    // クリア時刻より新しく、かつ未描画のもの
                    if (strokeTime > lastClearTime && !receivedStrokesMap.has(strokeId)) {
                        newStrokes.push({ id: strokeId, time: strokeTime, data: data });
                    }
                });
                
                // 作成時間順にソートして描画
                newStrokes.sort((a, b) => a.time - b.time);
                newStrokes.forEach(stroke => {
                    receivedStrokesMap.add(stroke.id);
                    drawReceivedStroke(stroke.data);
                });
            });
        }
        function reloadSharedStrokes() {
            if (!currentConversationUserId) return;
            const roomId = [myProfile.id, currentConversationUserId].sort().join('_');
            
            // 全クリア
            if (sharedCtx) {
                sharedCtx.fillStyle = '#ffffff';
                sharedCtx.fillRect(0, 0, sharedCanvas.width, sharedCanvas.height);
            }
            
            // クエリを取得して再描画
            const qStrokes = query(collection(db, "shared_strokes"), where("roomId", "==", roomId));
            getDocs(qStrokes).then(snapshot => {
                let strokes = [];
                snapshot.forEach(docSnap => {
                    const strokeId = docSnap.id;
                    const data = docSnap.data();
                    const strokeTime = data.createdAt ? data.createdAt.toDate().getTime() : 0;
                    
                    if (strokeTime > lastClearTime) {
                        strokes.push({ id: strokeId, time: strokeTime, data: data });
                    }
                });
                
                strokes.sort((a, b) => a.time - b.time);
                strokes.forEach(stroke => {
                    receivedStrokesMap.add(stroke.id);
                    drawReceivedStroke(stroke.data);
                });
            });
        }
        function drawReceivedStroke(strokeData) {
            if (!sharedCtx || !strokeData.points || strokeData.points.length === 0) return;
            
            // 描画
            sharedCtx.beginPath();
            sharedCtx.moveTo(strokeData.points[0].x, strokeData.points[0].y);
            
            for (let i = 1; i < strokeData.points.length; i++) {
                sharedCtx.lineTo(strokeData.points[i].x, strokeData.points[i].y);
            }
            
            sharedCtx.strokeStyle = strokeData.color;
            sharedCtx.lineWidth = strokeData.width;
            sharedCtx.lineCap = 'round';
            sharedCtx.lineJoin = 'round';
            sharedCtx.stroke();
        }
        function stopSharedPaintListener() {
            if (sharedStrokesListener) {
                sharedStrokesListener();
                sharedStrokesListener = null;
            }
            if (sharedCanvasListener) {
                sharedCanvasListener();
                sharedCanvasListener = null;
            }
            lastClearTime = 0;
            receivedStrokesMap.clear();
            
            // 絵チャボードが閉じられたときはキャンバスもクリアしておく
            if (sharedCtx && sharedCanvas) {
                sharedCtx.fillStyle = '#ffffff';
                sharedCtx.fillRect(0, 0, sharedCanvas.width, sharedCanvas.height);
            }
        }
