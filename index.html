<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易SNS - DM機能・長文対応版</title>
    <style>
        body { font-family: sans-serif; background-color: #000000; margin: 0; padding: 0; color: #e7e9ea; }
        .container { max-width: 600px; margin: 0 auto; background: #000000; min-height: 100vh; border-left: 1px solid #2f3336; border-right: 1px solid #2f3336; }
        
        /* 基本パーツ */
        .header-bar { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2f3336; background-color: rgba(0, 0, 0, 0.85); position: sticky; top: 0; backdrop-filter: blur(5px); z-index: 10; font-weight: bold; font-size: 18px; }
        .back-btn { background: none; border: none; cursor: pointer; margin-right: 15px; padding: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #e7e9ea; }
        .tabs { display: flex; border-bottom: 1px solid #2f3336; }
        .tab { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: #71767b; font-weight: bold; font-size: 16px; cursor: pointer; }
        .tab.active { color: #e7e9ea; border-bottom: 4px solid #1d9bf0; }
        
        .post-box { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; gap: 12px; }
        .post-box-right { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; border: none; resize: none; font-size: 16px; outline: none; margin-bottom: 10px; box-sizing: border-box; background: transparent; color: #e7e9ea; }
        button.post-btn { align-self: flex-end; background-color: #1d9bf0; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        
        .post { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; cursor: pointer; }
        .user-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: #2f3336; }
        
        /* DMスタイル */
        .dm-item { padding: 15px; border-bottom: 1px solid #2f3336; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .dm-item:hover { background: #080808; }
        .chat-area { display: flex; flex-direction: column; height: calc(100vh - 60px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; max-width: 80%; }
        .msg-my { align-self: flex-end; background: #1d9bf0; color: white; }
        .msg-other { align-self: flex-start; background: #2f3336; color: white; }
        .msg-input-area { padding: 15px; border-top: 1px solid #2f3336; display: flex; gap: 10px; }
        
        .view-section { display: none; }
        .icon { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="container">
        <div id="homeView" class="view-section">
            <div class="header-bar">ホーム</div>
            <div class="tabs">
                <div class="tab active" onclick="showHome()">タイムライン</div>
                <div class="tab" onclick="showDMList()">メッセージ</div>
                <div class="tab" onclick="showSettings()">設定</div>
            </div>
            <div class="post-box">
                <img src="" class="user-icon my-current-icon">
                <div class="post-box-right">
                    <textarea id="postText" rows="4" placeholder="いまどうしてる？（1000文字まで）"></textarea>
                    <button class="post-btn" onclick="submitPost()">ポストする</button>
                </div>
            </div>
            <div id="timeline"></div>
        </div>

        <div id="dmListView" class="view-section">
            <div class="header-bar">メッセージ</div>
            <div id="dmListContent"></div>
        </div>

        <div id="dmChatView" class="view-section">
            <div class="header-bar">
                <button class="back-btn" onclick="showDMList()">←</button>
                <span id="chatTitle">チャット</span>
            </div>
            <div class="chat-area">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="msg-input-area">
                    <textarea id="dmTextInput" rows="1" placeholder="メッセージを入力"></textarea>
                    <button class="post-btn" onclick="sendDM()">送信</button>
                </div>
            </div>
        </div>

        <div id="userProfileView" class="view-section"></div>
        <div id="settingsView" class="view-section"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp, getDocs, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // Firebase初期化等は省略（既存コードそのまま）
        const firebaseConfig = { /* 省略：既存コードと同じ */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let myProfile = JSON.parse(localStorage.getItem('mySNS_profile')) || { id: "user_"+Math.random() };
        let currentChatTargetId = "";

        // 投稿機能（制限1000文字）
        window.submitPost = async function() {
            const text = document.getElementById('postText').value.trim();
            if (text.length === 0) return;
            if (text.length > 1000) { alert("1000文字以内で投稿してください。"); return; }
            await addDoc(collection(db, "posts"), { content: text, createdAt: serverTimestamp(), userId: myProfile.id, userName: myProfile.name, userIcon: myProfile.icon });
            document.getElementById('postText').value = '';
        }

        // DM送信
        window.sendDM = async function() {
            const input = document.getElementById('dmTextInput');
            const text = input.value.trim();
            if (!text || !currentChatTargetId) return;
            
            const roomId = [myProfile.id, currentChatTargetId].sort().join('_');
            await addDoc(collection(db, "messages"), {
                roomId: roomId, senderId: myProfile.id, content: text, createdAt: serverTimestamp()
            });
            input.value = '';
        }

        // DM一覧表示（簡易版：会話したことがある相手を表示）
        window.showDMList = function() {
            document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
            document.getElementById('dmListView').style.display = 'block';
            // ここで会話履歴のある相手を取得するロジックを実装
        }

        // チャット画面を開く（プロフィールから呼び出す想定）
        window.openChat = function(userId, userName) {
            currentChatTargetId = userId;
            document.getElementById('chatTitle').innerText = userName;
            document.querySelectorAll('.view-section').forEach(el => el.style.display = 'none');
            document.getElementById('dmChatView').style.display = 'block';
            
            const roomId = [myProfile.id, userId].sort().join('_');
            const q = query(collection(db, "messages"), where("roomId", "==", roomId), orderBy("createdAt", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isMy = msg.senderId === myProfile.id;
                    container.innerHTML += `<div class="msg-bubble ${isMy ? 'msg-my' : 'msg-other'}">${msg.content}</div>`;
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
