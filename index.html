<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易SNS - エラー調査版</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f8fa; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; border-left: 1px solid #e1e8ed; border-right: 1px solid #e1e8ed; }
        header { padding: 15px; border-bottom: 1px solid #e1e8ed; font-weight: bold; font-size: 20px; }
        .post-box { padding: 15px; border-bottom: 10px solid #e1e8ed; display: flex; flex-direction: column; }
        textarea { width: 100%; border: none; resize: none; font-size: 18px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        button { align-self: flex-end; background-color: #1da1f2; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #0c85d0; }
        .post { padding: 15px; border-bottom: 1px solid #e1e8ed; }
        .post-time { font-size: 12px; color: #657786; margin-bottom: 5px; }
        .post-content { font-size: 15px; white-space: pre-wrap; }
        
        /* エラー表示用のスタイル */
        .error-box { padding: 20px; margin: 15px; border: 2px solid #e0245e; background-color: #ffebee; color: #e0245e; font-weight: bold; border-radius: 10px; }
        .error-reason { color: black; font-weight: normal; margin-top: 10px; font-family: monospace; background: white; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="container">
        <header>ホーム</header>
        
        <div class="post-box">
            <textarea id="postText" rows="3" placeholder="いまどうしてる？"></textarea>
            <button onclick="submitPost()">ポストする</button>
        </div>

        <div id="timeline" style="padding: 15px;">読み込み中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCQArL0Q1wDveRywCpet5Nor3PuRYt7fM",
            authDomain: "sabopennet.firebaseapp.com",
            projectId: "sabopennet",
            storageBucket: "sabopennet.firebasestorage.app",
            messagingSenderId: "284308308452",
            appId: "1:284308308452:web:e36dd991e55a0e60e4c7f1",
            measurementId: "G-K17XRK5KRN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.submitPost = async function() {
            const textInput = document.getElementById('postText');
            const text = textInput.value.trim();
            if (text === '') return;

            try {
                await addDoc(collection(db, "posts"), {
                    content: text,
                    createdAt: new Date()
                });
                textInput.value = '';
                loadPosts();
            } catch (e) {
                alert("投稿エラー: " + e.message);
            }
        }

        window.loadPosts = async function() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '通信中...';
            
            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                timeline.innerHTML = '';
                
                if (querySnapshot.empty) {
                    timeline.innerHTML = 'まだ投稿がありません。最初の投稿をしてみましょう！';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const post = doc.data();
                    const postDiv = document.createElement('div');
                    postDiv.className = 'post';
                    const date = post.createdAt ? post.createdAt.toDate().toLocaleString() : '';
                    const safeContent = post.content.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    postDiv.innerHTML = `<div class="post-time">${date}</div><div class="post-content">${safeContent}</div>`;
                    timeline.appendChild(postDiv);
                });
            } catch (e) {
                // エラー内容を画面に大きく表示するように変更
                timeline.innerHTML = `
                    <div class="error-box">
                        🚨 Firebaseとの通信に失敗しました！
                        <div class="error-reason">エラー詳細：<br>${e.message}</div>
                    </div>
                `;
            }
        }

        loadPosts();
    </script>
</body>
</html>
