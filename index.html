<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS - X完全版</title>
<script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
<style>
:root {
  --bg:#000;--border:#2f3336;--text:#e7e9ea;--sub:#71767b;--accent:#1d9bf0;--green:#00ba7c;--pink:#f91880;--card:#16181c;--hover:#080808;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== LAYOUT ===== */
.app{display:flex;max-width:1300px;margin:0 auto;min-height:100vh}
.sidenav{width:275px;padding:0 12px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sidenav-inner{display:flex;flex-direction:column;height:100%;padding:0 0 20px}
.logo{padding:12px;font-size:26px;font-weight:900;color:var(--accent);letter-spacing:-1px;cursor:pointer}
.nav-item{display:flex;align-items:center;gap:16px;padding:12px 16px;border-radius:30px;cursor:pointer;font-size:20px;font-weight:400;transition:.15s;white-space:nowrap;color:var(--text)}
.nav-item:hover{background:var(--card)}
.nav-item.active{font-weight:700}
.nav-item .nav-icon{font-size:24px;flex-shrink:0}
.nav-item .badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin-left:auto}
.post-btn-big{background:var(--accent);color:#fff;border:none;border-radius:30px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;margin:16px 0;width:100%;transition:.15s}
.post-btn-big:hover{background:#1a8cd8}
.profile-mini{display:flex;align-items:center;gap:10px;padding:12px;border-radius:30px;cursor:pointer;margin-top:auto;transition:.15s}
.profile-mini:hover{background:var(--card)}
.profile-mini img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.profile-mini .pname{font-weight:700;font-size:15px}
.profile-mini .phandle{color:var(--sub);font-size:14px}

.main-feed{flex:1;min-width:0;border-left:1px solid var(--border);border-right:1px solid var(--border);max-width:600px}
.right-sidebar{width:350px;padding:0 16px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}

@media(max-width:1280px){.right-sidebar{display:none}}
@media(max-width:1000px){.sidenav{width:88px}.sidenav .nav-item span{display:none}.sidenav .post-btn-big{font-size:0;padding:16px;width:50px;border-radius:50%}.sidenav .post-btn-big::before{content:"✏️";font-size:22px}.profile-mini .pname,.profile-mini .phandle{display:none}}
@media(max-width:680px){.sidenav{display:none}.app{flex-direction:column}.main-feed{border:none;max-width:100%}.bottom-nav{display:flex!important}}

/* ===== BOTTOM NAV (mobile) ===== */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);z-index:200;padding:8px 0}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;font-size:24px;padding:4px;position:relative;transition:.15s}
.bnav-item.active{color:var(--accent)}

/* ===== HEADER ===== */
.sticky-header{position:sticky;top:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:50;padding:0 16px;border-bottom:1px solid var(--border)}
.sticky-header h2{font-size:20px;font-weight:700;padding:15px 0 0}
.tabs{display:flex;gap:0}
.tab{flex:1;text-align:center;padding:14px 8px;cursor:pointer;color:var(--sub);font-weight:700;font-size:15px;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.tab:hover{background:rgba(255,255,255,.04)}
.tab.active{color:var(--text);border-color:var(--accent)}

/* ===== COMPOSE ===== */
.compose-area{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px}
.compose-right{flex:1;display:flex;flex-direction:column}
.compose-right textarea{background:transparent;border:none;outline:none;color:var(--text);font-size:20px;resize:none;width:100%;min-height:52px;padding-top:6px}
.compose-right textarea::placeholder{color:var(--sub)}
.audience-btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-size:13px;font-weight:700;padding:3px 12px;border-radius:20px;cursor:pointer;align-self:flex-start;margin-bottom:8px}
.compose-tools{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.compose-icons{display:flex;gap:0;align-items:center}
.compose-icon{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:8px;border-radius:50%;transition:.15s;display:flex;align-items:center;justify-content:center}
.compose-icon:hover{background:rgba(29,155,240,.1)}
.char-counter{width:26px;height:26px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);font-weight:700}
.char-counter.warn{border-color:#ffd400;color:#ffd400}
.char-counter.over{border-color:var(--pink);color:var(--pink)}
.divider-v{width:1px;height:28px;background:var(--border);margin:0 8px}
.post-btn{background:var(--accent);color:#fff;border:none;border-radius:20px;padding:8px 18px;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;white-space:nowrap}
.post-btn:hover{background:#1a8cd8}
.post-btn:disabled{opacity:.5;cursor:not-allowed}

/* ===== POST CARD ===== */
.post{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;cursor:pointer;transition:.15s;position:relative}
.post:hover{background:var(--hover)}
.post-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;cursor:pointer}
.post-avatar:hover{opacity:.9}
.post-body{flex:1;min-width:0}
.post-header{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.post-name{font-weight:700;font-size:15px;cursor:pointer;color:var(--text)}
.post-name:hover{text-decoration:underline}
.verified{color:var(--accent);font-size:14px}
.post-handle{color:var(--sub);font-size:15px}
.post-dot{color:var(--sub);font-size:15px}
.post-time{color:var(--sub);font-size:15px}
.post-menu{margin-left:auto;background:none;border:none;color:var(--sub);cursor:pointer;padding:4px;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.post-menu:hover{background:rgba(29,155,240,.1);color:var(--accent)}
.post-text{font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;color:var(--text)}
.hashtag{color:var(--accent);cursor:pointer}
.hashtag:hover{text-decoration:underline}
.mention{color:var(--accent);cursor:pointer}
.mention:hover{text-decoration:underline}

/* Media */
.media-grid{display:grid;border-radius:16px;overflow:hidden;margin-bottom:12px;gap:2px;max-height:510px}
.media-grid.count1{grid-template-columns:1fr}
.media-grid.count2{grid-template-columns:1fr 1fr}
.media-grid.count3{grid-template-columns:1fr 1fr;grid-template-rows:auto auto}
.media-grid.count3 .m0{grid-row:1/3}
.media-grid.count4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.media-grid img,.media-grid video{width:100%;height:100%;object-fit:cover;min-height:100px;max-height:350px;cursor:pointer;background:#000;display:block}
.media-grid.count2 img,.media-grid.count2 video,.media-grid.count3 img,.media-grid.count3 video,.media-grid.count4 img,.media-grid.count4 video{max-height:260px}

/* Quote */
.quote-card{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.15s}
.quote-card:hover{background:rgba(255,255,255,.03)}
.quote-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.quote-icon{width:18px;height:18px;border-radius:50%;object-fit:cover}

/* Actions */
.post-actions{display:flex;justify-content:space-between;max-width:425px;gap:0}
.act-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--sub);font-size:13px;cursor:pointer;padding:6px 10px;border-radius:20px;transition:.15s;font-weight:400}
.act-btn:hover.reply{color:var(--accent);background:rgba(29,155,240,.1)}
.act-btn:hover.repost{color:var(--green);background:rgba(0,186,124,.1)}
.act-btn:hover.like{color:var(--pink);background:rgba(249,24,128,.1)}
.act-btn:hover.view{color:var(--accent);background:rgba(29,155,240,.1)}
.act-btn:hover.bookmark{color:var(--accent);background:rgba(29,155,240,.1)}
.act-btn:hover.share{color:var(--accent);background:rgba(29,155,240,.1)}
.act-btn.liked{color:var(--pink)}
.act-btn.bookmarked{color:var(--accent)}
.act-btn.reposted{color:var(--green)}

/* Repost label */
.repost-label{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:13px;font-weight:700;margin-bottom:4px;padding-left:56px}

/* Reply thread */
.thread-line{position:absolute;left:36px;top:60px;bottom:0;width:2px;background:var(--border)}

/* Poll */
.poll-wrap{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.poll-opt{position:relative;height:40px;border-radius:6px;overflow:hidden;margin-bottom:8px;cursor:pointer}
.poll-bg{position:absolute;inset:0;background:var(--card);transition:.5s}
.poll-bg.winner{background:rgba(29,155,240,.25)}
.poll-fg{position:relative;display:flex;justify-content:space-between;padding:0 12px;height:100%;align-items:center;font-size:14px;font-weight:700;z-index:1}
.poll-vote-btn{width:100%;padding:10px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:20px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:.15s;font-size:14px}
.poll-vote-btn:hover{background:rgba(29,155,240,.1)}

/* Card link */
.link-card{border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:.15s;text-decoration:none;display:block}
.link-card:hover{background:rgba(255,255,255,.03)}
.link-card-img{width:100%;max-height:180px;object-fit:cover;background:var(--card)}
.link-card-body{padding:12px}
.link-card-domain{font-size:13px;color:var(--sub)}
.link-card-title{font-size:15px;font-weight:700;color:var(--text);margin-top:2px}

/* Space embed */
.space-card{border:1px solid #7856ff;border-radius:16px;padding:14px;margin-bottom:10px;background:linear-gradient(135deg,rgba(120,86,255,.1),transparent)}
.space-live{display:inline-flex;align-items:center;gap:4px;background:#7856ff;color:#fff;font-size:12px;font-weight:700;padding:3px 8px;border-radius:12px}

/* ===== RIGHT SIDEBAR ===== */
.search-box{background:var(--card);border-radius:30px;display:flex;align-items:center;gap:8px;padding:10px 14px;margin:12px 0}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:15px;width:100%}
.search-box input::placeholder{color:var(--sub)}
.widget-card{background:var(--card);border-radius:16px;overflow:hidden;margin-bottom:16px}
.widget-title{font-size:20px;font-weight:800;padding:12px 16px}
.trend-item{padding:10px 16px;cursor:pointer;transition:.15s}
.trend-item:hover{background:rgba(255,255,255,.04)}
.trend-top{color:var(--sub);font-size:12px}
.trend-kw{font-weight:700;font-size:15px;margin:2px 0}
.trend-cnt{color:var(--sub);font-size:13px}
.follow-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:.15s}
.follow-item:hover{background:rgba(255,255,255,.04)}
.follow-item img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.follow-info{flex:1;min-width:0}
.follow-btn{background:var(--text);color:var(--bg);border:none;border-radius:20px;padding:6px 14px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap}
.follow-btn:hover{background:#ccc}
.follow-btn.following{background:transparent;color:var(--text);border:1px solid var(--border)}
.follow-btn.following:hover{background:rgba(249,24,128,.1);color:var(--pink);border-color:var(--pink)}

/* ===== MODALS ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(91,112,131,.5);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 0 20px rgba(255,255,255,.1)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.modal-head h3{font-size:20px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.15s}
.modal-close:hover{background:var(--card)}

/* DM */
.dm-layout{display:flex;height:90vh;max-height:700px;max-width:800px}
.dm-list{width:360px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.dm-chat{flex:1;display:flex;flex-direction:column}
.dm-list-header{padding:16px;font-size:20px;font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
.dm-conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:.15s}
.dm-conv-item:hover,.dm-conv-item.active{background:var(--card)}
.dm-conv-item img{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.dm-conv-name{font-weight:700;font-size:15px}
.dm-conv-preview{color:var(--sub);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-chat-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-weight:700;font-size:17px;flex-shrink:0}
.dm-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.dm-bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.dm-bubble.mine{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.dm-bubble.theirs{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.dm-input-area{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.dm-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:10px 16px;color:var(--text);font-size:15px;outline:none;transition:.15s}
.dm-input:focus{border-color:var(--accent)}
.dm-send{background:var(--accent);color:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:.15s}
.dm-send:hover{background:#1a8cd8}

/* Notifications */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.notif-item:hover{background:var(--hover)}
.notif-icon{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
.notif-icon-symbol{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.notif-text{font-size:15px;line-height:1.5;color:var(--text)}
.notif-text strong{font-weight:700}

/* Profile */
.profile-banner{height:180px;background:linear-gradient(135deg,#1d9bf0,#7856ff);position:relative;cursor:pointer}
.profile-banner img{width:100%;height:100%;object-fit:cover}
.profile-ava{width:80px;height:80px;border-radius:50%;object-fit:cover;border:4px solid var(--bg);position:absolute;bottom:-40px;left:16px;cursor:pointer}
.profile-actions{display:flex;justify-content:flex-end;padding:12px 16px;gap:8px}
.edit-btn,.follow-profile-btn{border-radius:20px;padding:8px 16px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
.edit-btn{background:transparent;color:var(--text);border:1px solid var(--border)}
.edit-btn:hover{background:var(--card)}
.follow-profile-btn{background:var(--text);color:var(--bg);border:none}
.follow-profile-btn:hover{background:#ccc}
.follow-profile-btn.following{background:transparent;color:var(--text);border:1px solid var(--border)}
.follow-profile-btn.following:hover{background:rgba(249,24,128,.1);color:var(--pink);border-color:var(--pink)}
.profile-info{padding:52px 16px 12px}
.profile-displayname{font-size:20px;font-weight:700;display:flex;align-items:center;gap:4px}
.profile-handle{color:var(--sub);font-size:15px;margin-bottom:10px}
.profile-bio{font-size:15px;line-height:1.5;margin-bottom:10px;white-space:pre-wrap}
.profile-meta{display:flex;flex-wrap:wrap;gap:14px;color:var(--sub);font-size:15px;margin-bottom:12px}
.profile-meta span{display:flex;align-items:center;gap:4px}
.follow-counts{display:flex;gap:20px;font-size:15px}
.follow-counts strong{font-weight:700;color:var(--text)}

/* Settings */
.settings-section{padding:16px;border-bottom:1px solid var(--border)}
.settings-section h3{font-size:17px;font-weight:700;margin-bottom:16px}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:15px}
.settings-sub{font-size:13px;color:var(--sub);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;position:relative;transition:.3s;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.3s}
.toggle.on::after{left:22px}
.text-input{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:4px;padding:10px;font-size:15px;width:100%;outline:none;transition:.15s}
.text-input:focus{border-color:var(--accent)}
.settings-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
.settings-avatar{width:100px;height:100px;border-radius:50%;object-fit:cover}
.upload-label{background:var(--accent);color:#fff;padding:10px 20px;border-radius:20px;cursor:pointer;font-weight:700}

/* Dropdown */
.dropdown{position:absolute;right:0;top:36px;background:var(--bg);border:1px solid var(--border);border-radius:16px;box-shadow:0 0 20px rgba(0,0,0,.8);z-index:100;min-width:220px;overflow:hidden;display:none}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;font-size:15px;transition:.15s;color:var(--text)}
.dropdown-item:hover{background:var(--card)}
.dropdown-item.danger{color:var(--pink)}
.dropdown-item.danger:hover{background:rgba(249,24,128,.05)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;border-radius:24px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.top-notif{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;border-radius:24px;font-weight:700;z-index:9999;transition:top .4s cubic-bezier(.68,-.55,.27,1.55);pointer-events:none;white-space:nowrap}
.top-notif.show{top:20px}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:800;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img,.lightbox video{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Spaces */
.spaces-card{border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;transition:.15s;cursor:pointer}
.spaces-card:hover{background:var(--hover)}
.spaces-title{font-size:17px;font-weight:700;margin-bottom:8px}
.spaces-meta{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:14px}
.spaces-avatars{display:flex}
.spaces-avatars img{width:28px;height:28px;border-radius:50%;border:2px solid var(--bg);margin-left:-8px;object-fit:cover}
.spaces-avatars img:first-child{margin-left:0}

/* Lists */
.list-card{border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.list-card:hover{background:var(--hover)}
.list-banner{height:80px;background:linear-gradient(135deg,var(--accent),var(--green));border-radius:8px;margin-bottom:10px}

/* Topics */
.topic-pill{background:rgba(29,155,240,.15);color:var(--accent);border:1px solid rgba(29,155,240,.3);border-radius:20px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;display:inline-block;margin:4px}
.topic-pill:hover{background:rgba(29,155,240,.25)}

/* File preview */
.file-preview-wrap{position:relative;display:inline-block;margin-right:8px;margin-bottom:8px}
.file-preview-wrap img,.file-preview-wrap video{max-width:200px;max-height:150px;border-radius:12px;object-fit:cover;border:1px solid var(--border)}
.file-preview-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.gallery-item{position:relative;aspect-ratio:1;overflow:hidden}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:.15s}
.gallery-item:hover img,.gallery-item:hover video{opacity:.85}
.gallery-overlay{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:flex-end;padding:6px;gap:4px;opacity:0;transition:.15s}
.gallery-item:hover .gallery-overlay{opacity:1}
.gallery-act{background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s}
.gallery-act:hover{background:rgba(0,0,0,.9)}

/* Verified badge */
.vbadge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--accent);border-radius:50%;color:#fff;font-size:11px;flex-shrink:0}

/* Empty state */
.empty-state{padding:60px 16px;text-align:center;color:var(--sub)}
.empty-state h3{font-size:30px;font-weight:800;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:15px}

/* Loading */
.loading{padding:20px;text-align:center;color:var(--sub)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Embed */
.yt-embed{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;margin-bottom:10px}
.map-embed{width:100%;height:250px;border-radius:12px;border:none;margin-bottom:10px}

/* Emoji picker */
.emoji-picker{display:none;position:absolute;z-index:600;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px;width:300px;box-shadow:0 8px 24px rgba(0,0,0,.8)}
.emoji-picker.show{display:block}
.emoji-search{background:rgba(255,255,255,.08);border:none;outline:none;color:var(--text);border-radius:20px;padding:8px 14px;width:100%;font-size:14px;margin-bottom:8px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;max-height:220px;overflow-y:auto}
.emoji-grid button{background:none;border:none;font-size:22px;cursor:pointer;padding:6px;border-radius:6px;transition:.1s}
.emoji-grid button:hover{background:rgba(255,255,255,.1)}

/* Share modal */
.share-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.share-opt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:.15s;font-size:14px;font-weight:700}
.share-opt:hover{background:var(--card)}
.share-opt-icon{font-size:28px}

/* Scroll */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* New posts button */
.new-posts-btn{position:sticky;top:60px;left:0;right:0;z-index:40;margin:0 auto;width:fit-content;transform:translateY(0);display:none}
.new-posts-btn button{background:var(--accent);color:#fff;border:none;border-radius:30px;padding:10px 20px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(29,155,240,.4)}
</style>

// ===== NAVIGATION =====
function navigate(view, params = {}) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.bnav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  if (unsubTimeline) { unsubTimeline(); unsubTimeline = null; }

  const feed = document.getElementById('mainFeed');
  feed.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  switch(view) {
    case 'home': renderHome(); break;
    case 'explore': renderExplore(params.q || ''); break;
    case 'notifications': renderNotifications(); break;
    case 'messages': renderMessages(); break;
    case 'bookmarks': renderBookmarks(); break;
    case 'lists': renderLists(); break;
    case 'spaces': renderSpaces(); break;
    case 'gallery': renderGallery(); break;
    case 'profile': renderProfile(me.id); break;
    case 'settings': renderSettings(); break;
    case 'postDetail': renderPostDetail(params.id); break;
    case 'userProfile': renderProfile(params.uid); break;
    default: renderHome();
  }
}

async function loadTimeline() {
  const tl = document.getElementById('timeline');
  if (!tl) return;
  tl.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(50));
  let first = true;

  unsubTimeline = onSnapshot(q, snap => {
    if (first) {
      tl.innerHTML = '';
      const muted = getMuted(); const blocked = getBlocked();
      const following = getFollowing();

      let posts = [];
      snap.forEach(d => posts.push({ id:d.id, ...d.data() }));

      if (currentTab === 'following') {
        posts = posts.filter(p => following.includes(p.userId) || p.userId === me.id);
      }

      posts = posts.filter(p => !muted.includes(p.userId) && !blocked.includes(p.userId));

      if (posts.length === 0) {
        tl.innerHTML = `<div class="empty-state"><h3>${currentTab==='following'?'フォロー中のユーザーはいません':'まだ投稿がありません'}</h3><p>${currentTab==='following'?'右サイドバーからユーザーをフォローしよう':'最初の投稿をしてみよう！'}</p></div>`;
        return;
      }

      posts.forEach(p => {
        const el = createPostEl(p.id, p);
        if (el) tl.appendChild(el);
      });
      setTimeout(() => { if(window.twttr) window.twttr.widgets.load(); }, 200);
      first = false;
    } else {
      snap.docChanges().forEach(ch => {
        const p = { id:ch.doc.id, ...ch.doc.data() };
        if (ch.type === 'added' && !first) {
          const muted = getMuted(); const blocked = getBlocked();
          if (muted.includes(p.userId) || blocked.includes(p.userId)) return;
          const el = createPostEl(p.id, p);
          if (el) {
            tl.insertBefore(el, tl.firstChild);
            if (p.userId !== me.id) showTopNotif('📢 新着ポストが届きました');
            setTimeout(() => { if(window.twttr) window.twttr.widgets.load(); }, 200);
          }
        }
        if (ch.type === 'modified') {
          const old = document.getElementById('post-' + p.id);
          if (old) { const ne = createPostEl(p.id, p); if(ne) tl.replaceChild(ne, old); }
        }
        if (ch.type === 'removed') {
          const old = document.getElementById('post-' + p.id);
          if (old) old.remove();
        }
      });
    }
  });
}

// ===== POST ELEMENT =====
function createPostEl(pid, post) {
  if (!post) return null;
  const now = new Date();
  const dObj = post.createdAt ? post.createdAt.toDate() : new Date();
  if (dObj > now && post.userId !== me.id) return null;

  const safeUid = post.userId || '';
  const likes = JSON.parse(localStorage.getItem('sns_likes')) || [];
  const bookmarks = JSON.parse(localStorage.getItem('sns_bookmarks')) || [];
  const repostedSet = JSON.parse(localStorage.getItem('sns_reposted')) || [];
  const isLiked = likes.includes(pid);
  const isBookmarked = bookmarks.includes(pid);
  const isReposted = repostedSet.includes(pid);
  const isOwn = safeUid === me.id;

  const div = document.createElement('div');
  div.className = 'post';
  div.id = 'post-' + pid;

  // Repost label
  const repLabel = post.isRepost ? `<div class="repost-label">🔁 ${escHtml(post.repostedBy||'')} さんがリポスト</div>` : '';

  // Time
  const timeStr = formatTime(dObj);
  const schedLabel = dObj > now ? `<span style="color:var(--accent);font-size:12px;border:1px solid var(--accent);padding:2px 6px;border-radius:4px">🕐 予約</span>` : '';

  // Content
  const htmlContent = parseContent(post.content || '');

  // Media
  let mediaHtml = '';
  if (post.mediaUrls && post.mediaUrls.length > 0) {
    const cnt = Math.min(post.mediaUrls.length, 4);
    mediaHtml = `<div class="media-grid count${cnt}">`;
    post.mediaUrls.slice(0, 4).forEach((url, i) => {
      const isVid = url.match(/\.(mp4|webm|ogg|mov)/i) || post.mediaTypes?.[i] === 'video';
      if (isVid) {
        mediaHtml += `<video src="${url}" controls playsinline class="m${i}" style="object-fit:cover;border-radius:${cnt===1?'16px':'4px'}" onclick="openLightbox('${url}','video');event.stopPropagation()"></video>`;
      } else {
        mediaHtml += `<img src="${url}" alt="" class="m${i}" style="border-radius:${cnt===1?'16px':'4px'}" onclick="openLightbox('${url}','image');event.stopPropagation()">`;
      }
    });
    mediaHtml += '</div>';
  }

  // Poll
  let pollHtml = '';
  if (post.poll && post.poll.options) {
    const tv = post.poll.votes ? Object.keys(post.poll.votes).length : 0;
    const myVote = post.poll.votes?.[me.id];
    const hasVoted = myVote !== undefined;
    pollHtml = `<div class="poll-wrap">`;
    post.poll.options.forEach((opt, i) => {
      const cnt2 = post.poll.votes ? Object.values(post.poll.votes).filter(v=>v===i).length : 0;
      const pct = tv ? Math.round((cnt2/tv)*100) : 0;
      const isWin = cnt2 === Math.max(...post.poll.options.map((_,j) => Object.values(post.poll.votes||{}).filter(v=>v===j).length));
      if (hasVoted) {
        pollHtml += `<div class="poll-opt"><div class="poll-bg ${isWin?'winner':''}" style="width:${pct}%"></div><div class="poll-fg"><span>${escHtml(opt)} ${myVote===i?'✓':''}</span><span>${pct}%</span></div></div>`;
      } else {
        pollHtml += `<button class="poll-vote-btn" onclick="votePoll('${pid}',${i});event.stopPropagation()">${escHtml(opt)}</button>`;
      }
    });
    pollHtml += `<div style="color:var(--sub);font-size:13px;margin-top:4px">${tv} 票</div></div>`;
  }

  // Quote
  let quoteHtml = '';
  if (post.isQuoteRepost && post.originalPost) {
    const op = post.originalPost;
    quoteHtml = `<div class="quote-card" onclick="navigate('postDetail',{id:'${op.postId}'});event.stopPropagation()"><div class="quote-head"><img src="${op.userIcon||DEF_ICON}" class="quote-icon"><span style="font-weight:700;font-size:14px">${escHtml(op.userName||'')}</span></div><div style="font-size:14px;line-height:1.4;white-space:pre-wrap;word-break:break-word">${parseContent(op.content||'')}</div></div>`;
  }

  // Verified
  const vbadge = post.verified ? '<span class="vbadge">✓</span>' : '';

  // Menu items
  const menuItems = isOwn
    ? `<div class="dropdown-item danger" onclick="deletePost('${pid}');closeAllDropdowns()">🗑️ 削除</div>
       <div class="dropdown-item" onclick="pinPost('${pid}');closeAllDropdowns()">📌 ピン留め</div>`
    : `<div class="dropdown-item" onclick="muteUser('${safeUid}');closeAllDropdowns()">🔇 ミュート</div>
       <div class="dropdown-item danger" onclick="blockUser('${safeUid}');closeAllDropdowns()">🚫 ブロック</div>
       <div class="dropdown-item danger" onclick="reportPost('${pid}');closeAllDropdowns()">⚠️ 報告</div>`;

  div.innerHTML = `
    ${repLabel}
    <img src="${post.userIcon||DEF_ICON}" class="post-avatar" onclick="showUserProfile('${safeUid}');event.stopPropagation()" alt="">
    <div class="post-body">
      <div class="post-header">
        <span class="post-name" onclick="showUserProfile('${safeUid}');event.stopPropagation()">${escHtml(post.userName||'名無し')}</span>
        ${vbadge}
        <span class="post-handle">@${safeUid.substr(0,10)}</span>
        <span class="post-dot">·</span>
        <span class="post-time">${timeStr}</span>
        ${schedLabel}
        <button class="post-menu" onclick="toggleDropdown('menu-${pid}');event.stopPropagation()">···</button>
        <div class="dropdown" id="menu-${pid}">
          <div class="dropdown-item" onclick="sharePost('${pid}');closeAllDropdowns()">🔗 リンクをコピー</div>
          <div class="dropdown-item" onclick="shareAction('bookmark','${pid}');closeAllDropdowns()">🔖 ブックマーク</div>
          ${menuItems}
        </div>
      </div>
      <div class="post-text">${htmlContent}</div>
      ${mediaHtml}${pollHtml}${quoteHtml}
      <div class="post-actions" onclick="event.stopPropagation()">
        <button class="act-btn reply" onclick="openReplyCompose('${pid}')">💬 <span id="rc-${pid}">${post.replies>0?post.replies:''}</span></button>
        <button class="act-btn repost ${isReposted?'reposted':''}" onclick="repostMenu('${pid}')">🔁 <span id="rpc-${pid}">${post.reposts>0?post.reposts:''}</span></button>
        <button class="act-btn like ${isLiked?'liked':''}" id="like-btn-${pid}" onclick="likePost('${pid}','${safeUid}')">♥ <span id="lc-${pid}">${post.likes>0?post.likes:''}</span></button>
        <button class="act-btn view">👁️ <span>${post.views>0?post.views:''}</span></button>
        <button class="act-btn bookmark ${isBookmarked?'bookmarked':''}" id="bm-btn-${pid}" onclick="bookmarkPost('${pid}')">🔖</button>
        <button class="act-btn share" onclick="sharePost('${pid}')">↗️</button>
      </div>
    </div>
  `;

  div.addEventListener('click', (e) => {
    if (e.target.closest('.post-actions') || e.target.closest('.dropdown') || e.target.closest('.post-menu') || e.target.closest('.post-avatar') || e.target.closest('.post-name')) return;
    navigate('postDetail', { id: pid });
  });

  return div;
}

function onComposeInput() {
  const txt = document.getElementById('composeText').value;
  const rem = 280 - txt.length;
  const cc = document.getElementById('charCounter');
  cc.innerText = rem < 0 ? rem : rem;
  cc.className = 'char-counter' + (rem < 0 ? ' over' : rem < 20 ? ' warn' : '');
  const can = (txt.trim().length > 0 || composeFiles.length > 0) && rem >= 0;
  document.getElementById('composeSubmitBtn').disabled = !can;
  document.getElementById('composeSubmitBtn2').disabled = !can;
}

function onComposeFileSelect(event, inline = false) {
  const files = Array.from(event.target.files);
  files.forEach(f => {
    if (composeFiles.length >= 4) { showToast('⚠️ 最大4ファイルまで'); return; }
    composeFiles.push(f);
  });
  renderFilePreviews(inline);
  onComposeInput();
  event.target.value = '';
}

function renderFilePreviews(inline = false) {
  const container = document.getElementById(inline ? 'inlineFilePreviews' : 'composeFilePreviews');
  if (!container) return;
  container.innerHTML = '';
  composeFiles.forEach((f, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'file-preview-wrap';
    const url = URL.createObjectURL(f);
    if (f.type.startsWith('video/')) {
      wrap.innerHTML = `<video src="${url}" style="max-width:120px;max-height:100px;border-radius:10px;object-fit:cover;border:1px solid var(--border)"></video><button class="file-preview-del" onclick="removeComposeFile(${i},${inline})">×</button>`;
    } else {
      wrap.innerHTML = `<img src="${url}" style="max-width:120px;max-height:100px;border-radius:10px;object-fit:cover;border:1px solid var(--border)"><button class="file-preview-del" onclick="removeComposeFile(${i},${inline})">×</button>`;
    }
    container.appendChild(wrap);
  });
}

function removeComposeFile(idx, inline) {
  composeFiles.splice(idx, 1);
  renderFilePreviews(inline);
  onComposeInput();
}

async function submitCompose(inline = false) {
  const ta = document.getElementById(inline ? 'inlineCompose' : 'composeText');
  let txt = (ta?.value || '').trim();
  const videoUrl = document.getElementById(inline ? '' : 'composeVideoUrl')?.value?.trim() || '';
  if (videoUrl) txt += (txt ? '\n\n' : '') + videoUrl;

  if (!txt && composeFiles.length === 0) return;
  if (txt.length > 280) { showAlert('エラー', '280文字を超えています'); return; }

  const btn = document.getElementById(inline ? 'inlinePostBtn' : 'composeSubmitBtn2');
  if (btn) btn.disabled = true;
  showToast('⏳ 投稿中...');

  try {
    let mediaUrls = [], mediaTypes = [];

    for (const f of composeFiles) {
      showToast('⏳ メディアをアップロード中...');
      const url = await uploadToCatbox(f);
      mediaUrls.push(url);
      mediaTypes.push(f.type.startsWith('video/') ? 'video' : 'image');
      // Gallery auto-save
      await addDoc(collection(db, "savedImages"), { userId:me.id, url, createdAt:new Date(), type:mediaTypes[mediaTypes.length-1] });
    }

    let poll = null;
    if (composePollActive) {
      const opts = [1,2,3,4].map(i => document.getElementById('pollOpt'+i)?.value?.trim()).filter(Boolean);
      if (opts.length >= 2) poll = { options:opts, votes:{} };
    }

    const schedEl = document.getElementById('scheduleInput');
    const schedVal = schedEl?.value;
    const postTime = (schedVal && schedVal !== '' && !inline) ? new Date(schedVal) : new Date();

    const postData = {
      content: txt, createdAt: postTime, userId: me.id, userName: me.name, userIcon: me.icon,
      isRepost: false, isQuoteRepost: !!currentQuotePostId, views: 0, likes: 0, reposts: 0, replies: 0,
      mediaUrls, mediaTypes
    };
    if (poll) postData.poll = poll;
    if (currentQuotePostId) {
      const qsnap = await getDoc(doc(db,"posts",currentQuotePostId));
      if (qsnap.exists()) {
        const qd = qsnap.data();
        postData.originalPost = { postId:currentQuotePostId, userName:qd.userName, userIcon:qd.userIcon||DEF_ICON, content:qd.content };
      }
    }

    await addDoc(collection(db, "posts"), postData);

    ta.value = '';
    composeFiles = [];
    document.getElementById(inline ? 'inlineFilePreviews' : 'composeFilePreviews').innerHTML = '';
    currentQuotePostId = null;
    if (!inline) { closeComposeModal(); loadSidebarTrends(); }
    showToast(postTime > new Date() ? '🕐 予約しました' : '✅ ポストしました！');
    if (inline) { const b = document.getElementById('inlinePostBtn'); if(b) b.disabled = true; }
  } catch(e) { showAlert('エラー', e.message); }
  if (btn) btn.disabled = false;
}

window.likePost = async function(pid, uid) {
  if (uid === me.id) { showToast('自分のポストはいいねできません'); return; }
  let likes = JSON.parse(localStorage.getItem('sns_likes')) || [];
  const isLiked = likes.includes(pid);
  const ref = doc(db, "posts", pid);
  try {
    if (isLiked) {
      await updateDoc(ref, { likes: increment(-1) });
      likes = likes.filter(id => id !== pid);
    } else {
      await updateDoc(ref, { likes: increment(1) });
      likes.push(pid);
      await addDoc(collection(db,"notifications"), { type:"like", postId:pid, senderId:me.id, senderName:me.name, senderIcon:me.icon, targetUserId:uid, createdAt:new Date() });
    }
    localStorage.setItem('sns_likes', JSON.stringify(likes));
    const btn = document.getElementById('like-btn-' + pid);
    const cnt = document.getElementById('lc-' + pid);

async function renderTrendTopics() {
  const el = document.getElementById('exploreContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const snap = await getDocs(query(collection(db,"posts"), orderBy("createdAt","desc"), limit(100)));
  const tags = {};
  snap.forEach(d => {
    const c = d.data().content || '';
    const re = /(?:^|\s)([#＃]\S+)/g; let m;
    while ((m = re.exec(c)) !== null) tags[m[1]] = (tags[m[1]]||0)+1;
  });
  const sorted = Object.entries(tags).sort((a,b) => b[1]-a[1]).slice(0,20);
  el.innerHTML = `<div style="padding:16px"><div style="font-size:22px;font-weight:800;margin-bottom:16px">🔥 トレンド</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${sorted.map(([t,c]) => `<div class="topic-pill" onclick="document.getElementById('exploreSearch').value='${escHtml(t)}';renderSearchResults('${escHtml(t)}')">${escHtml(t)} <span style="color:var(--sub);font-weight:400;font-size:12px">${c}</span></div>`).join('')}
    </div></div>`;
}

async function renderSearchResults(kw) {
  const el = document.getElementById('exploreContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const snap = await getDocs(query(collection(db,"posts"), orderBy("createdAt","desc"), limit(200)));
  el.innerHTML = '';
  let found = 0;
  snap.forEach(d => {
    const p = d.data();
    if ((p.content||'').toLowerCase().includes(kw.toLowerCase()) || (p.userName||'').toLowerCase().includes(kw.toLowerCase())) {
      const el2 = createPostEl(d.id, p);
      if (el2) { el.appendChild(el2); found++; }
    }
  });
  if (!found) el.innerHTML = '<div class="empty-state"><h3>見つかりませんでした</h3><p>別のキーワードで試してみましょう</p></div>';
}

async function loadDMInlineList() {
  const el = document.getElementById('dmInlinelist');
  if (!el) return;
  const snap = await getDocs(query(collection(db,"dm_messages"), where("participants","array-contains",me.id), orderBy("createdAt","desc")));
  const seen = new Set();
  const convMap = {};
  snap.forEach(d => {
    const msg = d.data();
    const otherId = msg.senderId === me.id ? msg.receiverId : msg.senderId;
    if (!seen.has(otherId)) { seen.add(otherId); convMap[otherId] = msg; }
  });
  if (Object.keys(convMap).length === 0) { el.innerHTML = '<div class="empty-state"><h3>DMなし</h3><p>フォロー中のユーザーにメッセージを送ろう</p></div>'; return; }

    const div = document.createElement('div');
    div.className = 'dm-conv-item';
    div.innerHTML = `<img src="${msg.senderId===me.id?(msg.receiverIcon||DEF_ICON):(msg.senderIcon||DEF_ICON)}" style="width:48px;height:48px;border-radius:50%;object-fit:cover"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px">${escHtml(msg.senderId===me.id?(msg.receiverName||''):( msg.senderName||''))}</div><div style="color:var(--sub);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(msg.content||'')}</div></div>`;

    el.appendChild(div);
  }
}

async function loadDMMessages(uid) {
  const el = document.getElementById('dmMsgList');
  if (!el) return;
  if (dmUnsubMap[uid]) { dmUnsubMap[uid](); }
  const q = query(collection(db,"dm_messages"), where("participants","array-contains",me.id), orderBy("createdAt","asc"));
  dmUnsubMap[uid] = onSnapshot(q, snap => {
    if (!el) return;
    el.innerHTML = '';
    snap.forEach(d => {
      const msg = d.data();
      if (!((msg.senderId===me.id&&msg.receiverId===uid)||(msg.senderId===uid&&msg.receiverId===me.id))) return;
      const mine = msg.senderId === me.id;
      const bub = document.createElement('div');
      bub.className = 'dm-bubble ' + (mine ? 'mine' : 'theirs');
      if (msg.mediaUrl) {
        if (msg.mediaType === 'video') bub.innerHTML = `<video src="${msg.mediaUrl}" controls style="max-width:200px;border-radius:8px"></video>`;
        else bub.innerHTML = `<img src="${msg.mediaUrl}" style="max-width:200px;border-radius:8px;cursor:pointer" onclick="openLightbox('${msg.mediaUrl}','image')">`;
        if (msg.content) bub.innerHTML += `<div style="margin-top:6px">${escHtml(msg.content)}</div>`;
      } else {
        bub.innerText = msg.content || '';
      }
      el.appendChild(bub);
    });
    el.scrollTop = el.scrollHeight;
  });
}

async function loadGallery() {
  const el = document.getElementById('galleryGrid');
  if (!el) return;
  el.innerHTML = '<div class="loading" style="grid-column:span 3"><div class="spinner"></div></div>';
  const snap = await getDocs(query(collection(db,"savedImages"), where("userId","==",me.id)));
  let items = []; snap.forEach(d => items.push({id:d.id,...d.data()}));
  items.sort((a,b) => b.createdAt.toDate() - a.createdAt.toDate());
  el.innerHTML = '';
  if (!items.length) { el.innerHTML = '<div style="grid-column:span 3;padding:40px;text-align:center;color:var(--sub)">まだ保存されたファイルはありません</div>'; return; }

window.followUser = async function(uid, name, icon) {
  let following = getFollowing();
  const isF = following.includes(uid);
  if (isF) { following = following.filter(id => id !== uid); showToast('フォローを解除しました'); }
  else {
    following.push(uid);
    showToast(`✅ ${name} をフォローしました`);
    await addDoc(collection(db,"notifications"), { type:"follow", senderId:me.id, senderName:me.name, senderIcon:me.icon, targetUserId:uid, createdAt:new Date() });
  }
  localStorage.setItem('sns_following', JSON.stringify(following));
  const btn = document.getElementById('followProfBtn');
  if (btn) { btn.className = 'follow-profile-btn ' + (!isF?'following':''); btn.innerText = !isF?'フォロー中':'フォロー'; }
  const sideBtns = document.querySelectorAll('.follow-btn[data-uid="' + uid + '"]');
  sideBtns.forEach(b => { b.className = 'follow-btn ' + (!isF?'following':''); b.innerText = !isF?'フォロー中':'フォロー'; });
};

async function renderPostDetail(pid) {
  const feed = document.getElementById('mainFeed');
  feed.innerHTML = `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px"><button onclick="history.back()" style="background:none;border:none;color:var(--text);cursor:pointer;font-size:20px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center">←</button><div style="font-weight:800;font-size:20px">ポスト</div></div><div id="detailContent"><div class="loading"><div class="spinner"></div></div></div>`;
  try {
    const ref = doc(db,"posts",pid);
    try { await updateDoc(ref, { views: increment(1) }); } catch(e) {}
    const snap = await getDoc(ref);
    if (!snap.exists()) { document.getElementById('detailContent').innerHTML = '<div class="empty-state"><h3>見つかりません</h3></div>'; return; }
    const post = snap.data();
    const el = createPostEl(pid, post);
    const dc = document.getElementById('detailContent');
    dc.innerHTML = '';
    if (el) {
      el.style.cursor = 'default';
      el.style.borderBottom = '1px solid var(--border)';
      dc.appendChild(el);
    }
    // Reply compose
    const replyDiv = document.createElement('div');
    replyDiv.style.cssText = 'padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;background:var(--bg)';
    replyDiv.innerHTML = `<img src="${me.icon}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0"><div style="flex:1"><textarea id="replyTA" placeholder="${escHtml(post.userName||'')}さんへの返信..." rows="2" style="background:transparent;border:none;outline:none;color:var(--text);font-size:16px;resize:none;width:100%;padding-top:4px" oninput="document.getElementById('replyPostBtn').disabled=!this.value.trim()"></textarea><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;gap:4px"><button class="compose-icon" onclick="document.getElementById('replyFileInput').click()">🖼️</button><button class="compose-icon" onclick="openEmojiPicker('replyTA',event)">😊</button><input type="file" id="replyFileInput" accept="image/*,video/*" style="display:none" onchange="handleReplyFile(event)"></div><button class="post-btn" id="replyPostBtn" onclick="submitReply('${pid}')" disabled>返信</button></div><div id="replyFilePrev" style="margin-top:8px"></div></div>`;
    dc.appendChild(replyDiv);

    // Replies
    const replies = await getDocs(query(collection(db,"replies"), where("postId","==",pid), orderBy("createdAt","asc")));
    const rContainer = document.createElement('div');
    if (replies.empty) { rContainer.innerHTML = '<div class="empty-state" style="padding:40px"><h3>返信なし</h3><p>最初の返信をしてみよう</p></div>'; }
    replies.forEach(rd => {
      const r = rd.data();
      const dObj = r.createdAt?.toDate() || new Date();
      const likes2 = JSON.parse(localStorage.getItem('sns_reply_likes')) || [];
      const isLiked = likes2.includes(rd.id);
      const div = document.createElement('div');
      div.className = 'post'; div.style.borderBottom = '1px solid var(--border)';
      div.innerHTML = `<img src="${r.userIcon||DEF_ICON}" class="post-avatar" onclick="showUserProfile('${r.userId}');event.stopPropagation()"><div class="post-body"><div class="post-header"><span class="post-name" onclick="showUserProfile('${r.userId}');event.stopPropagation()">${escHtml(r.userName||'')}</span><span class="post-handle">@${(r.userId||'').substr(0,10)}</span><span class="post-dot">·</span><span class="post-time">${formatTime(dObj)}</span></div><div class="post-text">${parseContent(r.content||'')}</div>
      ${r.mediaUrl?`<img src="${r.mediaUrl}" style="max-width:100%;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="openLightbox('${r.mediaUrl}','image')">`:''} 
      <div class="post-actions" onclick="event.stopPropagation()"><button class="act-btn reply">💬</button><button class="act-btn repost">🔁</button><button class="act-btn like ${isLiked?'liked':''}" id="rlike-${rd.id}" onclick="likeReply('${rd.id}')">♥ <span id="rlc-${rd.id}">${r.likes>0?r.likes:''}</span></button><div class="act-btn view">👁️</div></div></div>`;
      rContainer.appendChild(div);
    });
    dc.appendChild(rContainer);
    setTimeout(() => { if(window.twttr) window.twttr.widgets.load(); }, 200);

    // Reply handlers
    let replyFile = null;
    window.handleReplyFile = async (ev) => {
      replyFile = ev.target.files[0];
      if (!replyFile) return;
      const prev = document.getElementById('replyFilePrev');
      const url = URL.createObjectURL(replyFile);
      if (replyFile.type.startsWith('video/')) prev.innerHTML = `<video src="${url}" style="max-width:150px;border-radius:8px"></video>`;
      else prev.innerHTML = `<img src="${url}" style="max-width:150px;border-radius:8px">`;
    };
    window.submitReply = async (postId) => {
      const txt = document.getElementById('replyTA')?.value?.trim(); if (!txt) return;
      let mediaUrl = '', mediaType = '';
      if (replyFile) { try { mediaUrl = await uploadToCatbox(replyFile); mediaType = replyFile.type.startsWith('video/')?'video':'image'; } catch(e){} }
      try {
        await addDoc(collection(db,"replies"), { postId, content:txt, createdAt:new Date(), userId:me.id, userName:me.name, userIcon:me.icon, likes:0, mediaUrl, mediaType });
        await updateDoc(doc(db,"posts",postId), { replies: increment(1) });
        document.getElementById('replyTA').value = '';
        document.getElementById('replyPostBtn').disabled = true;
        document.getElementById('replyFilePrev').innerHTML = '';
        replyFile = null;
        showToast('✅ 返信しました');
        renderPostDetail(postId);
      } catch(e) {}
    };
    window.likeReply = async (rid) => {
      let likes2 = JSON.parse(localStorage.getItem('sns_reply_likes'))||[];
      const isLiked = likes2.includes(rid);
      try {
        await updateDoc(doc(db,"replies",rid), { likes: increment(isLiked?-1:1) });
        likes2 = isLiked ? likes2.filter(x=>x!==rid) : [...likes2,rid];
        localStorage.setItem('sns_reply_likes', JSON.stringify(likes2));
        const btn = document.getElementById('rlike-'+rid);
        const cnt = document.getElementById('rlc-'+rid);
        if (btn) btn.className = 'act-btn like '+(isLiked?'':'liked');
        if (cnt) { const v=parseInt(cnt.innerText)||0; cnt.innerText = isLiked?Math.max(0,v-1)||'':v+1||''; }
      } catch(e) {}
    };
  } catch(e) { document.getElementById('detailContent').innerHTML = `<div class="empty-state"><h3>エラー</h3><p>${e.message}</p></div>`; }
}

async function runAIImage() {
  const prompt = document.getElementById('aiImgPrompt').value.trim();
  if (!prompt) { showToast('⚠️ プロンプトを入力してください'); return; }
  document.getElementById('aiImagePreview').style.display = 'none';
  showToast('🎨 AI画像生成中...');
  let eng = prompt;
  if (/[ぁ-んァ-ヶ一-龯]/.test(prompt)) {
    try { const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q=${encodeURIComponent(prompt)}`); const d=await r.json(); eng=d[0][0][0]; } catch(e){}
  }
  const seed = Math.floor(Math.random()*99999);
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(eng)}?seed=${seed}&width=512&height=512&nologo=true`;
  const img = document.getElementById('aiImagePreviewImg');
  img.onload = () => { document.getElementById('aiImagePreview').style.display = 'block'; showToast('✅ 生成完了！'); };
  img.onerror = () => showAlert('エラー', '生成に失敗しました');
  img.src = url;
  aiGeneratedImgUrl = url;
}

async function attachAIImage() {
  if (!aiGeneratedImgUrl) return;
  try { await addDoc(collection(db,"savedImages"), { userId:me.id, url:aiGeneratedImgUrl, createdAt:new Date(), type:'image' }); } catch(e) {}
  const ta = document.getElementById('composeText') || document.getElementById('inlineCompose');
  if (ta) { ta.value += (ta.value ? '\n\n' : '') + aiGeneratedImgUrl; onComposeInput(); }
  document.getElementById('aiImageOverlay').style.display = 'none';
  showToast('✅ 添付・保存しました');
  aiGeneratedImgUrl = '';
}

// ===== SIDEBAR =====
async function loadTrends() {
  const el = document.getElementById('trendsList');
  const snap = await getDocs(query(collection(db,"posts"), orderBy("createdAt","desc"), limit(100)));
  const tags = {};
  snap.forEach(d => { const c=d.data().content||''; const re=/(?:^|\s)([#＃]\S+)/g; let m; while((m=re.exec(c))!==null) tags[m[1]]=(tags[m[1]]||0)+1; });
  const sorted = Object.entries(tags).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if (!sorted.length) { el.innerHTML = '<div style="padding:12px 16px;color:var(--sub);font-size:14px">トレンドはまだありません</div>'; return; }
  el.innerHTML = sorted.map(([t,c],i) => `<div class="trend-item" onclick="navigate('explore',{q:'${escHtml(t)}'})"><div class="trend-top">トレンド ${i+1}</div><div class="trend-kw">${escHtml(t)}</div><div class="trend-cnt">${c} 件</div></div>`).join('');
}
window.loadSidebarTrends = loadTrends;

async function loadSuggestions() {
  const el = document.getElementById('suggestList');
  const snap = await getDocs(query(collection(db,"posts"), orderBy("createdAt","desc"), limit(100)));
  const users = {};
  snap.forEach(d => { const p=d.data(); if(p.userId&&p.userId!==me.id) users[p.userId]={name:p.userName,icon:p.userIcon||DEF_ICON}; });
  const following = getFollowing();
  const list = Object.entries(users).filter(([uid])=>!following.includes(uid)).slice(0,3);
  if (!list.length) { el.innerHTML = '<div style="padding:12px 16px;color:var(--sub);font-size:14px">おすすめユーザーなし</div>'; return; }
  el.innerHTML = list.map(([uid,u]) => `<div class="follow-item"><img src="${u.icon}" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onclick="showUserProfile('${uid}');event.stopPropagation()"><div class="follow-info" onclick="showUserProfile('${uid}')" style="cursor:pointer"><div style="font-weight:700;font-size:15px">${escHtml(u.name||'')}</div><div style="color:var(--sub);font-size:13px">@${uid.substr(0,10)}</div></div><button class="follow-btn ${following.includes(uid)?'following':''}" data-uid="${uid}" onclick="followUser('${uid}','${escHtml(u.name||'')}','${u.icon}');this.className='follow-btn following';this.innerText='フォロー中'">${following.includes(uid)?'フォロー中':'フォロー'}</button></div>`).join('');
}

// ===== UPLOAD =====
async function uploadToCatbox(file) {
  const fd = new FormData();
  fd.append('reqtype','fileupload');
  fd.append('fileToUpload', file);
  const res = await fetch('https://catbox.moe/user/api.php', { method:'POST', body:fd });
  if (!res.ok) throw new Error('アップロード失敗 ('+res.status+')');
  const url = await res.text();
  return url.trim();
}

// ===== CONTENT PARSER =====
function parseContent(text) {
  if (!text) return '';
  let safe = escHtml(text);
  // Hashtags
  safe = safe.replace(/(^|\s)([#＃]\S+)/g, (m, sp, tag) => `${sp}<span class="hashtag" onclick="navigate('explore',{q:'${escHtml(tag)}'});event.stopPropagation()">${tag}</span>`);
  // Mentions
  safe = safe.replace(/(^|\s)@(\S+)/g, (m, sp, handle) => `${sp}<span class="mention" onclick="event.stopPropagation()">@${handle}</span>`);
  // URLs
  const urlRe = /(https?:\/\/[^\s]+)/g;
  safe = safe.replace(urlRe, url => {
    const noQ = url.split('?')[0];
    if (noQ.match(/\.(jpeg|jpg|gif|png|webp)$/i) || url.includes('image.pollinations.ai')) return `<br><img src="${url}" style="max-width:100%;border-radius:16px;margin-top:8px;cursor:pointer" onclick="openLightbox('${url}','image');event.stopPropagation()">`;
    if (noQ.match(/\.(mp4|webm|ogg|mov)$/i)) return `<br><video src="${url}" controls playsinline style="max-width:100%;border-radius:16px;margin-top:8px;max-height:400px;background:#000"></video>`;
    const yt = url.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (yt) return `<br><iframe class="yt-embed" src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen></iframe>`;
    const nico = url.match(/nicovideo\.jp\/watch\/([a-zA-Z0-9]+)/);
    if (nico) return `<br><iframe class="yt-embed" src="https://embed.nicovideo.jp/watch/${nico[1]}" allowfullscreen></iframe>`;
    const maps = url.match(/maps\.google\.com\/maps\?q=([^&\s]+)/);
    if (maps) return `<br><iframe class="map-embed" src="https://maps.google.com/maps?q=${maps[1]}&output=embed"></iframe>`;
    const tw = url.match(/(?:twitter\.com|x\.com)\/[^/]+\/status\/\d+/);
    if (tw) return `<blockquote class="twitter-tweet" data-theme="dark"><a href="${url}"></a></blockquote>`;
    const tc = url.match(/twitcasting\.tv\/([a-zA-Z0-9_-]+)/);
    if (tc) return `<br><iframe class="yt-embed" src="https://twitcasting.tv/${tc[1]}/iframe" allowfullscreen></iframe>`;
    return `<a href="${url}" target="_blank" style="color:var(--accent)" onclick="event.stopPropagation()">${url}</a>`;
  });
  return safe;
}

// ===== HELPERS =====
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'); }

function formatTime(d) {
  const now = new Date(), diff = now - d;
  const mins = Math.floor(diff/60000), hrs = Math.floor(mins/60);
  if (mins < 1) return '今';
  if (mins < 60) return mins + '分前';
  if (hrs < 24) return hrs + '時間前';
  if (hrs < 24*7) return Math.floor(hrs/24) + '日前';
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}
