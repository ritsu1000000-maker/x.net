<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易SNS - カウント機能搭載版</title>
    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #000000;
            --header-bg: rgba(0, 0, 0, 0.85);
            --border-color: #2f3336;
            --text-color: #e7e9ea;
            --text-muted: #71767b;
            --hover-bg: #080808;
            --tab-hover-bg: #181818;
            --menu-bg: #000000;
            --menu-hover-bg: #16181c;
            --modal-overlay-bg: rgba(91, 112, 131, 0.4);
            --modal-content-bg: #000000;
            --shadow-color: rgba(255, 255, 255, 0.1);
            --audio-invert: 1;
        }
        [data-theme="light"] {
            --bg-color: #ffffff;
            --container-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.85);
            --border-color: #eff3f4;
            --text-color: #0f1419;
            --text-muted: #536471;
            --hover-bg: #f7f7f7;
            --tab-hover-bg: #e7e7e8;
            --menu-bg: #ffffff;
            --menu-hover-bg: #f7f9f9;
            --modal-overlay-bg: rgba(0, 0, 0, 0.4);
            --modal-content-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --audio-invert: 0;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-color); transition: background-color 0.2s, color 0.2s; }
        .container { max-width: 600px; margin: 0 auto; background: var(--container-bg); min-height: 100vh; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        
        .header-bar { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); background-color: var(--header-bg); position: sticky; top: 0; backdrop-filter: blur(5px); z-index: 10; font-weight: bold; font-size: 18px; }
        .back-btn { background: none; border: none; cursor: pointer; margin-right: 15px; padding: 5px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-color); }
        .back-btn:hover { background-color: var(--hover-bg); }

        .tabs { display: flex; border-bottom: 1px solid var(--border-color); }
        .tab { flex: 1; text-align: center; padding: 15px; text-decoration: none; color: var(--text-muted); font-weight: bold; font-size: 16px; cursor: pointer; }
        .tab:hover { background-color: var(--tab-hover-bg); }
        .tab.active { color: var(--text-color); border-bottom: 4px solid #1d9bf0; }

        .post-box { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .post-box-right { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; border: none; resize: none; font-size: 18px; outline: none; margin-bottom: 10px; box-sizing: border-box; background: transparent; color: var(--text-color); }
        button.post-btn { align-self: flex-end; background-color: #1d9bf0; color: white; border: none; border-radius: 20px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        button.post-btn:hover { background-color: #1a8cd8; }
        
        .post { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; cursor: pointer; transition: background-color 0.2s, opacity 0.3s, transform 0.3s; position: relative; }
        .post:hover { background-color: var(--hover-bg); }
        .post-left { margin-right: 12px; }
        .post-right { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        
        .user-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background-color: var(--border-color); }
        .user-name { font-weight: bold; font-size: 15px; color: var(--text-color); }
        .user-name:hover { text-decoration: underline; }
        
        .post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; padding-right: 30px; position: relative; }
        .post-time { font-size: 14px; color: var(--text-muted); }
        .post-content { font-size: 15px; white-space: pre-wrap; margin-bottom: 10px; line-height: 1.4; color: var(--text-color); }
        .repost-label { font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }

        .quote-box { border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-top: 10px; margin-bottom: 10px; cursor: pointer; transition: background-color 0.2s; }
        .quote-box:hover { background-color: var(--hover-bg); }
        .quote-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .quote-icon { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .quote-name { font-weight: bold; font-size: 13px; color: var(--text-color); }
        .quote-content { font-size: 14px; color: var(--text-color); white-space: pre-wrap; line-height: 1.4; }

        .icon { width: 18px; height: 18px; fill: currentColor; display: inline-block; vertical-align: middle; }

        .post-actions { display: flex; justify-content: space-between; max-width: 450px; margin-top: 5px; }
        .action-btn { background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; padding: 6px 10px; border-radius: 15px; display: flex; align-items: center; gap: 6px; transition: background-color 0.2s, color 0.2s; }
        .action-btn.reply:hover { background-color: #031018; color: #1d9bf0; }
        .action-btn.repost:hover { background-color: #05140c; color: #00ba7c; }
        .action-btn.like:hover, .action-btn.like.liked { background-color: #200914; color: #f91880; }
        .action-btn.view:hover { background-color: #031018; color: #1d9bf0; }
        .action-btn.share:hover { background-color: #16181c; color: #1d9bf0; }
        
        .count-span { font-size: 14px; min-width: 15px; text-align: left; }

        .menu-trigger { position: absolute; right: 0; top: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; transition: background-color 0.2s, color 0.2s; }
        .menu-trigger:hover { background-color: #031018; color: #1d9bf0; }

        .dropdown-menu { display: none; position: absolute; right: 0; top: 35px; background: var(--menu-bg); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 0 15px var(--shadow-color); z-index: 20; width: 180px; overflow: hidden; padding: 5px 0; }
        .menu-item { padding: 12px 16px; font-size: 14px; color: var(--text-color); cursor: pointer; display: flex; align-items: center; gap: 10px; text-align: left; transition: background-color 0.2s; }
        .menu-item:hover { background-color: var(--menu-hover-bg); }
        .menu-item.danger { color: #f91880; }
        .menu-item.danger:hover { background-color: #200914; }

        .detail-main-user { display: flex; align-items: center; padding: 20px 20px 10px 20px; gap: 12px; position: relative; }
        .detail-main-post { padding: 10px 20px 20px 20px; border-bottom: 1px solid var(--border-color); font-size: 22px; line-height: 1.4; color: var(--text-color); }
        .detail-main-time { padding: 15px 20px; color: var(--text-muted); font-size: 15px; border-bottom: 1px solid var(--border-color); }
        .detail-reply-box { padding: 15px; border-bottom: 1px solid var(--border-color); background-color: var(--container-bg); display: flex; gap: 12px; }
        .reply-list { padding: 0; }
        .reply-item { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; transition: background-color 0.2s; }
        .reply-item.clickable:hover { background-color: var(--hover-bg); }
        
        .file-input-label { display: flex; align-items: center; gap: 8px; background-color: #1d9bf0; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; text-align: center; transition: background-color 0.2s; justify-content: center; }
        .file-input-label:hover { background-color: #1a8cd8; }
        #profileFile { display: none; }
        input[type="text"] { background-color: transparent; color: var(--text-color); }
        
        .view-section { display: none; }
        .error-box { padding: 20px; margin: 15px; border: 2px solid #f91880; background-color: #200914; color: #f91880; font-weight: bold; border-radius: 10px; }

        /* リポストモーダル用のスタイル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay-bg); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--modal-content-bg); width: 90%; max-width: 600px; border-radius: 16px; border: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 15px var(--shadow-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-weight: bold; font-size: 18px; color: var(--text-color); }
        .close-modal { background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; padding: 0 5px; }
        .close-modal:hover { color: #1d9bf0; }
        .modal-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; }

        /* 追加スタイル */
        .tool-btn:hover { background-color: var(--hover-bg) !important; }
        audio {
            border-radius: 20px;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: var(--hover-bg);
        }
        audio::-webkit-media-controls-play-button,
        audio::-webkit-media-controls-timeline,
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display,
        audio::-webkit-media-controls-volume-control-container,
        audio::-webkit-media-controls-volume-slider,
        audio::-webkit-media-controls-mute-button {
            filter: invert(var(--audio-invert, 0));
        }
        .color-dot, .shared-color-dot {
            transition: transform 0.1s, border-color 0.1s;
        }
        .color-dot:hover, .shared-color-dot:hover {
            transform: scale(1.1);
        }
        .color-dot.active, .shared-color-dot.active {
            transform: scale(1.15);
        }
    </style>
</head>
<body onclick="closeAllMenus()">

    <div class="container">

        <!-- ホームビュー -->
        <div id="homeView" class="view-section">
            <div class="header-bar">ホーム</div>
            <div class="tabs">
                <div class="tab active" onclick="showHome()">タイムライン</div>
                <div class="tab" onclick="showDMs()">DM</div>
                <div class="tab" id="notificationLink" onclick="showNotifications()">通知</div>
                <div class="tab" onclick="showUserProfile(myProfile.id)">プロフィール</div>
                <div class="tab" onclick="showSettings()">設定</div>
            </div>
            
            <div class="post-box">
                <div onclick="showUserProfile(myProfile.id, event)" style="cursor:pointer;"><img src="" class="user-icon my-current-icon"></div>
                <div class="post-box-right">
                    <textarea id="postText" rows="3" placeholder="いまどうしてる？"></textarea>
                    
                    <!-- プレビュープレースホルダー -->
                    <div id="postAudioPreviewContainer" style="display:none; margin-bottom:10px; align-items:center; gap:10px; background:var(--hover-bg); padding:10px; border-radius:12px;">
                        <audio id="postAudioPreview" controls style="flex:1; height:36px;"></audio>
                        <button onclick="removeAudioPreview('postAudio')" style="background:none; border:none; color:#f91880; cursor:pointer; font-weight:bold; font-size:14px; padding:5px 10px;">削除</button>
                    </div>
                    <div id="postNicoPreviewContainer" style="display:none; margin-bottom:10px; align-items:center; gap:10px; background:var(--hover-bg); padding:10px; border-radius:12px;">
                        <span style="font-size:14px; color:var(--text-color); flex:1;" id="postNicoPreviewTitle">ニコニコ動画</span>
                        <button onclick="removeNicoPreview('post')" style="background:none; border:none; color:#f91880; cursor:pointer; font-weight:bold;">削除</button>
                    </div>
                    <div id="postYTPreviewContainer" style="display:none; margin-bottom:10px; align-items:center; gap:10px; background:var(--hover-bg); padding:10px; border-radius:12px;">
                        <span style="font-size:14px; color:var(--text-color); flex:1;" id="postYTPreviewTitle">YouTube動画</span>
                        <button onclick="removeYTPreview('post')" style="background:none; border:none; color:#f91880; cursor:pointer; font-weight:bold;">削除</button>
                    </div>
                    <!-- お絵描きプレビュー -->
                    <div id="postDrawingPreviewContainer" style="display:none; margin-bottom:10px; position:relative; width:150px; height:150px; background:#ffffff; border:1px solid var(--border-color); border-radius:12px; overflow:hidden; padding:5px; align-items:center; justify-content:center;">
                        <img id="postDrawingPreview" style="max-width:100%; max-height:100%; object-fit:contain;">
                        <button onclick="removeDrawingPreview('post')" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.6); border:none; color:white; border-radius:50%; width:24px; height:24px; cursor:pointer; font-weight:bold; font-size:14px; display:flex; align-items:center; justify-content:center;">×</button>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button id="postVoiceInputBtn" class="tool-btn" onclick="toggleVoiceInput('postText')" style="background:none; border:none; color:#1d9bf0; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color 0.2s;" title="音声入力">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                            </button>
                            <button id="postVoiceRecordBtn" class="tool-btn" onclick="toggleVoiceRecord('postAudio')" style="background:none; border:none; color:#1d9bf0; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color 0.2s;" title="音声送信">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-13c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
                            </button>
                            <button class="tool-btn" onclick="openNicoSearchModal('post')" style="background:none; border:none; color:#1d9bf0; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color 0.2s;" title="ニコニコ動画埋め込み">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 9H9v2h3v2H7V8h5v4zm7 4h-5v-2h3v-2h-3V8h5v8z"/></svg>
                            </button>
                            <button class="tool-btn" onclick="openYTSearchModal('post')" style="background:none; border:none; color:#1d9bf0; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color 0.2s;" title="YouTube動画埋め込み">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M23 12s-.2-2.7-1.4-3.9c-1.5-1.6-3.2-1.6-4-1.7C14.8 6.2 12 6.2 12 6.2s-2.8 0-5.6.2c-.8.1-2.5.1-4 1.7C1.2 9.3 1 12 1 12s.2 2.7 1.4 3.9c1.5 1.6 3.2 1.6 4 1.7 2.8.2 5.6.2 5.6.2s2.8 0 5.6-.2c.8-.1 2.5-.1 4-1.7 1.2-1.2 1.4-3.9 1.4-3.9zM9.6 15.2V8.8l6 3.2-6 3.2z"/></svg>
                            </button>
                            <button class="tool-btn" onclick="openPaintModal('post')" style="background:none; border:none; color:#1d9bf0; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color 0.2s;" title="お絵描き">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            </button>
                            <span id="postVoiceStatus" style="font-size:12px; color:#71767b; display:none;"></span>
                        </div>
                        <button class="post-btn" onclick="submitPost()">ポストする</button>
                    </div>
                </div>
            </div>
            <!-- 検索バー -->
            <div style="padding: 10px 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; align-items: center; background-color: var(--container-bg);">
                <svg class="icon" viewBox="0 0 24 24" style="color: var(--text-muted); width: 20px; height: 20px;"><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"/></svg>
                <input type="text" id="timelineSearchInput" placeholder="キーワードでポストを検索..." style="flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 20px; font-size: 14px; outline: none; background: transparent; color: var(--text-color);" onkeydown="if(event.key==='Enter') executeTimelineSearch()">
                <button class="post-btn" onclick="executeTimelineSearch()" style="padding: 6px 15px; font-size: 13px;">検索</button>
                <button id="clearSearchBtn" class="post-btn" onclick="clearTimelineSearch()" style="padding: 6px 15px; font-size: 13px; background-color: var(--border-color); color: var(--text-color); display: none;">クリア</button>
            </div>
            <div id="timeline"></div>
        </div>

        <!-- DM一覧・チャットビュー -->
        <div id="dmView" class="view-section">
            <div class="header-bar">ダイレクトメッセージ</div>
            <div class="tabs">
                <div class="tab" onclick="showHome()">タイムライン</div>
                <div class="tab active" onclick="showDMs()">DM</div>
                <div class="tab" id="notificationLinkDM" onclick="showNotifications()">通知</div>
                <div class="tab" onclick="showUserProfile(myProfile.id)">プロフィール</div>
                <div class="tab" onclick="showSettings()">設定</div>
            </div>
            <div style="padding: 15px; display: flex; justify-content: flex-end;">
                <button class="post-btn" onclick="openNewChatModal()" style="font-size:14px; padding: 8px 16px;">新規チャット</button>
            </div>
            <div id="conversationList"></div>
        </div>

        <div id="chatView" class="view-section" style="display:none; flex-direction:column;">
            <div class="header-bar" style="display:flex; align-items:center;">
                <button class="back-btn" onclick="showDMs()">
                    <svg class="icon" style="width:22px; height:22px;" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span id="chatPartnerName" style="flex:1;">チャット</span>
                <button class="tool-btn" id="chatPaintBtn" onclick="toggleSharedPaint()" style="background:none; border:none; color:#1d9bf0; cursor:pointer; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background-color 0.2s;" title="リアルタイム絵チャ">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.07 19.58 10.47 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm1 13h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
                </button>
            </div>
            
            <!-- 共有お絵描きチャットボード -->
            <div id="sharedPaintContainer" style="display:none; flex-direction:column; background:var(--container-bg); border-bottom:1px solid var(--border-color); padding:10px; gap:8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; color:var(--text-color); font-size:14px;">🎨 リアルタイム絵チャボード</span>
                    <div style="display:flex; gap:8px;">
                        <button class="post-btn" onclick="saveSharedPaintImage()" style="font-size:12px; padding:4px 10px; background-color:#1d9bf0;">保存</button>
                        <button class="post-btn" onclick="clearSharedPaint()" style="font-size:12px; padding:4px 10px; background-color:#f91880;">全消去</button>
                        <button class="post-btn" onclick="toggleSharedPaint()" style="font-size:12px; padding:4px 10px; background-color:var(--border-color); color:var(--text-color);">閉じる</button>
                    </div>
                </div>
                <div style="display:flex; justify-content:center; align-items:center; overflow:hidden; position:relative; border:1px solid var(--border-color); border-radius:8px; background:#ffffff; max-width:100%;">
                    <canvas id="sharedPaintCanvas" width="600" height="600" style="display:block; width:100%; max-width:400px; height:auto; cursor:crosshair; touch-action:none; background:#ffffff;"></canvas>
                </div>
                <!-- 絵チャ用簡易ツール -->
                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:center;">
                    <div class="shared-color-dot active" style="background:#000000; width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid #1d9bf0;" onclick="selectSharedColor('#000000', this)"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {

            collection, 
            addDoc,

            getDoc,
            doc, 
            query, 
            where,

            limit, 
            updateDoc, 
            deleteDoc,
            increment,
            onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAsdf-PlaceholderKeyHere",
            authDomain: "ritsu-sns.firebaseapp.com",
            projectId: "ritsu-sns",
            storageBucket: "ritsu-sns.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // サーバー時刻同期用のダミーオフセット
        let serverTimeOffset = 0;
        async function fetchServerTimeOffset() {
            serverTimeOffset = 0;
        }

        // ユーザープロフィールの初期化 (ローカルストレージ)
        let myProfile = JSON.parse(localStorage.getItem('mySNS_profile'));
        if (!myProfile) {
            const randomId = "user_" + Math.random().toString(36).substring(2, 8);
            myProfile = {
                id: randomId,
                name: "ゲストユーザー",
                icon: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231d9bf0'/><circle cx='50' cy='35' r='20' fill='%23ffffff'/><path d='M20,80 C20,60 80,60 80,80' stroke='%23ffffff' stroke-width='8' fill='%23ffffff'/></svg>"
            };
            localStorage.setItem('mySNS_profile', JSON.stringify(myProfile));
        }

        const defaultIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2371767b'/><circle cx='50' cy='35' r='20' fill='%23ffffff'/><path d='M20,80 C20,60 80,60 80,80' stroke='%23ffffff' stroke-width='8' fill='%23ffffff'/></svg>";
        let uploadedImageBase64 = "";

        function updateMyIconDisplays() {
            document.querySelectorAll('.my-current-icon').forEach(img => {
                img.src = myProfile.icon;
            });
        }

        // テーマの動的切り替え
        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('mySNS_theme', theme);
            const select = document.getElementById('settingsThemeSelect');
            if (select) select.value = theme;
        };

        window.toggleTheme = function() {
            const current = localStorage.getItem('mySNS_theme') || 'dark';
            const next = current === 'light' ? 'dark' : 'light';
            setTheme(next);
        };

        const initThemeToggle = () => {
            document.querySelectorAll('.header-bar').forEach(header => {
                if (header.querySelector('.theme-toggle-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'back-btn theme-toggle-btn';
                btn.innerHTML = `
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM6.161 5.1a.75.75 0 011.06 0l1.59 1.59a.75.75 0 11-1.06 1.06l-1.59-1.59a.75.75 0 010-1.06zm11.678 0a.75.75 0 010 1.06l-1.59 1.59a.75.75 0 11-1.06-1.06l1.59-1.59a.75.75 0 011.06 0zM12 5.25a6.75 6.75 0 106.75 6.75A6.758 6.758 0 0012 5.25zm0 12a5.25 5.25 0 115.25-5.25 5.256 5.256 0 01-5.25 5.25zM3 12a.75.75 0 01.75-.75h2.25a.75.75 0 010 1.5H3.75A.75.75 0 013 12zm15 0a.75.75 0 01.75-.75h2.25a.75.75 0 010 1.5h-2.25A.75.75 0 0118 12zM6.161 18.9a.75.75 0 010-1.06l1.59-1.59a.75.75 0 111.06 1.06l-1.59 1.59a.75.75 0 01-1.06 0zm11.678 0a.75.75 0 01-1.06 0l-1.59-1.59a.75.75 0 111.06-1.06l1.59 1.59a.75.75 0 010 1.06zM12 18.75a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-1.5a.75.75 0 01.75-.75z"/></svg>
                `;
                btn.style.width = '36px';
                btn.style.height = '36px';
                btn.style.borderRadius = '50%';
                btn.style.display = 'flex';
                btn.style.alignItems = 'center';
                btn.style.justifyContent = 'center';
                btn.style.marginLeft = 'auto';
                btn.onclick = (e) => { e.stopPropagation(); toggleTheme(); };
                
                header.appendChild(btn);
            });
            
            const initialTheme = localStorage.getItem('mySNS_theme') || 'dark';
            setTheme(initialTheme);
        };

        // 🎙️ 音声入力(Speech Recognition)の実装
        let recognition = null;
        let isRecognizing = false;

        window.toggleVoiceInput = function(textareaId) {
            const textarea = document.getElementById(textareaId);
            const isPost = textareaId === 'postText';
            const isReply = textareaId === 'detailReplyText';
            let btn = null;
            let statusSpan = null;

            if (isPost) {
                btn = document.getElementById('postVoiceInputBtn');
                statusSpan = document.getElementById('postVoiceStatus');
            } else if (isReply) {
                btn = document.getElementById('replyVoiceInputBtn');
                statusSpan = document.getElementById('replyVoiceStatus');
            } else {
                btn = document.getElementById('chatVoiceInputBtn');
                statusSpan = document.getElementById('chatVoiceStatus');
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("このブラウザは音声入力をサポートしていません。");
                return;
            }

            if (isRecognizing) {
                recognition.stop();
                return;
            }

            if (isRecording) {
                mediaRecorder.stop();
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            let finalTranscript = '';

            recognition.onstart = () => {
                isRecognizing = true;
                btn.style.color = '#f91880';
                btn.style.backgroundColor = 'var(--hover-bg)';
                statusSpan.style.display = 'inline';
                statusSpan.innerText = '🎙️ 聞き取り中...';
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                if (!textarea.dataset.initialText) {
                    textarea.dataset.initialText = textarea.value;
                }
                textarea.value = textarea.dataset.initialText + finalTranscript + interimTranscript;
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error:", event.error);
                stopRecognition();
            };

            recognition.onend = () => {
                stopRecognition();
            };

            function stopRecognition() {
                isRecognizing = false;
                btn.style.color = '#1d9bf0';
                btn.style.backgroundColor = 'transparent';
                statusSpan.style.display = 'none';
                delete textarea.dataset.initialText;
            }

            recognition.start();
        };

        // 🔴 音声送信(マイク録音・ボイスメッセージ)の実装
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordInterval = null;
        let recordStartTime = 0;
        window.postAudioData = "";
        window.replyAudioData = "";
        window.dmAudioData = "";

        window.toggleVoiceRecord = async function(prefix) {
            const isPost = prefix === 'postAudio';
            const isReply = prefix === 'replyAudio';
            let btn = null;
            let statusSpan = null;

            if (isPost) {
                btn = document.getElementById('postVoiceRecordBtn');
                statusSpan = document.getElementById('postVoiceStatus');
            } else if (isReply) {
                btn = document.getElementById('replyVoiceRecordBtn');
                statusSpan = document.getElementById('replyVoiceStatus');
            } else {
                btn = document.getElementById('chatVoiceRecordBtn');
                statusSpan = document.getElementById('chatVoiceStatus');
            }
            
            if (isRecording) {
                mediaRecorder.stop();
                return;
            }

            if (isRecognizing) {
                recognition.stop();
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("このブラウザは音声録音をサポートしていません。");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                
                let options = { mimeType: 'audio/webm' };
                if (!MediaRecorder.isTypeSupported('audio/webm')) {
                    options = { mimeType: 'audio/ogg' };
                    if (!MediaRecorder.isTypeSupported('audio/ogg')) {
                        options = { mimeType: 'audio/mp4' };
                        if (!MediaRecorder.isTypeSupported('audio/mp4')) {
                            options = {};
                        }
                    }
                }

                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstart = () => {
                    isRecording = true;
                    recordStartTime = Date.now();
                    btn.style.color = '#f91880';
                    btn.style.backgroundColor = 'var(--hover-bg)';
                    statusSpan.style.display = 'inline';
                    statusSpan.innerText = '🔴 0:00 / 0:30';
                    
                    recordInterval = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
                        if (elapsed >= 30) {
                            mediaRecorder.stop();
                            alert("最長録音時間の30秒に達しました。");
                        } else {
                            const secs = elapsed % 60;
                            statusSpan.innerText = `🔴 0:${secs < 10 ? '0' : ''}${secs} / 0:30`;
                        }
                    }, 1000);
                };

                mediaRecorder.onstop = () => {
                    clearInterval(recordInterval);
                    isRecording = false;
                    btn.style.color = '#1d9bf0';
                    btn.style.backgroundColor = 'transparent';
                    statusSpan.style.display = 'none';
                    
                    stream.getTracks().forEach(track => track.stop());

                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    
                    if (audioBlob.size > 800000) {
                        alert("録音データが大きすぎます。");
                        return;
                    }

                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64data = reader.result;
                        if (isPost) {
                            window.postAudioData = base64data;
                            showAudioPreview('postAudio', base64data);
                        } else if (isReply) {
                            window.replyAudioData = base64data;
                            showAudioPreview('replyAudio', base64data);
                        } else {
                            window.dmAudioData = base64data;
                            showAudioPreview('chatAudio', base64data);
                        }
                    };
                };

                mediaRecorder.start();

            } catch (err) {
                console.error("Microphone access error:", err);
                alert("マイクへのアクセスに失敗しました。");
            }
        };

        window.showAudioPreview = function(prefix, dataUrl) {
            const container = document.getElementById(`${prefix}PreviewContainer`);
            const audio = document.getElementById(`${prefix}Preview`);
            if (container && audio) {
                audio.src = dataUrl;
                container.style.display = 'flex';
            }
        };

        window.removeAudioPreview = function(prefix) {
            const container = document.getElementById(`${prefix}PreviewContainer`);
            const audio = document.getElementById(`${prefix}Preview`);
            if (container && audio) {
                audio.src = '';
                container.style.display = 'none';
            }
            if (prefix === 'postAudio') {
                window.postAudioData = '';
            } else if (prefix === 'replyAudio') {
                window.replyAudioData = '';
            } else {
                window.dmAudioData = '';
            }
        };
